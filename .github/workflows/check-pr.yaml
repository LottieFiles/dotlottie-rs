name: Check PR

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: ${{ matrix.name }}
    if: github.head_ref != 'release'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Fmt
            cmd: cargo fmt --manifest-path=./dotlottie-rs/Cargo.toml --all -- --check
          - name: Test
            cmd: cargo test --manifest-path=./dotlottie-rs/Cargo.toml --features="dev" -- --test-threads=1
            native: true
          - name: Lint
            cmd: cargo clippy --manifest-path=./dotlottie-rs/Cargo.toml --features="dev" --all-targets -- -D clippy::print_stdout
            native: true
            rustflags: "-Dwarnings"
    env:
      CC: clang
      CXX: clang++
      AR: llvm-ar
      RANLIB: llvm-ranlib
      CFLAGS: -O2
      CXXFLAGS: -O2
      BINDGEN_EXTRA_CLANG_ARGS: "-I/usr/include"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ matrix.native == true }}
          fetch-depth: ${{ matrix.native && 0 || 1 }}

      - name: Install LLVM tools
        if: matrix.native
        run: sudo apt-get update && sudo apt-get install -y llvm

      - name: Setup Rust
        uses: ningenMe/setup-rustup@v1.1.0

      - name: Cache cargo
        if: matrix.native
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: check
          cache-on-failure: true

      - name: ${{ matrix.name }}
        run: ${{ matrix.cmd }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}