name: Check PR

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build
        run: cargo build --manifest-path=./dotlottie-rs/Cargo.toml --features thorvg
      - name: Test
        run: cargo test --manifest-path=./dotlottie-rs/Cargo.toml --features thorvg -- --test-threads=1
      - name: Lint
        run: cargo clippy --manifest-path=./dotlottie-rs/Cargo.toml --features thorvg -- -D warnings
