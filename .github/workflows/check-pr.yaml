name: Check PR

on:
  push:
    branches: [chore/build]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ningenMe/setup-rustup@v1.1.0
      - name: Setup WASM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen
          cargo install uniffi-bindgen-cpp --git https://github.com/NordSecurity/uniffi-bindgen-cpp --tag v0.7.1+v0.28.3
          make wasm-install-emsdk
          make wasm-install-targets

      - name: Build WASM
        run: make wasm

      - name: Optimize WASM
        run: wasm-opt release/wasm/DotLottiePlayer.wasm -o release/wasm/DotLottiePlayer.wasm -all -Oz

      - name: Upload WASM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotlottie-player.wasm.tar.gz
          path: release/wasm/dotlottie-player.wasm.tar.gz
          if-no-files-found: error
