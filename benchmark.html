<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DotLottie Renderer Benchmark</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #1a1a1a;
        color: #fff;
        padding: 20px;
      }

      .header {
        max-width: 1400px;
        margin: 0 auto 30px;
        text-align: center;
      }

      h1 {
        font-size: 32px;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #888;
        font-size: 14px;
      }

      .controls {
        max-width: 1400px;
        margin: 0 auto 20px;
        display: flex;
        gap: 20px;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: #2a2a2a;
        border-radius: 8px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .control-group label {
        font-size: 12px;
        color: #888;
        text-transform: uppercase;
      }

      select,
      button,
      input {
        padding: 10px 20px;
        font-size: 14px;
        border: none;
        border-radius: 4px;
        background: #333;
        color: #fff;
        cursor: pointer;
      }

      button {
        background: #007bff;
        transition: background 0.2s;
      }

      button:hover {
        background: #0056b3;
      }

      button:disabled {
        background: #555;
        cursor: not-allowed;
      }

      .stats-panel {
        max-width: 1400px;
        margin: 0 auto 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      .stat-card {
        background: #2a2a2a;
        padding: 15px;
        border-radius: 8px;
        border-left: 3px solid #007bff;
      }

      .stat-label {
        font-size: 12px;
        color: #888;
        text-transform: uppercase;
        margin-bottom: 5px;
      }

      .stat-value {
        font-size: 24px;
        font-weight: bold;
      }

      .stat-unit {
        font-size: 14px;
        color: #888;
        margin-left: 5px;
      }

      .canvas-grid {
        max-width: 1400px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
        padding: 20px;
        background: #2a2a2a;
        border-radius: 8px;
      }

      .canvas-grid.single {
        grid-template-columns: 1fr;
        max-width: 600px;
      }

      .canvas-wrapper {
        position: relative;
        background: #1a1a1a;
        border-radius: 4px;
        overflow: hidden;
      }

      .canvas-wrapper canvas {
        display: block;
        width: 100%;
        height: auto;
        image-rendering: crisp-edges;
      }

      .canvas-wrapper.failed {
        opacity: 0.3;
      }

      .canvas-wrapper.failed .canvas-label {
        background: rgba(139, 0, 0, 0.7);
      }

      .canvas-label {
        position: absolute;
        top: 5px;
        left: 5px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 3px 8px;
        font-size: 11px;
        border-radius: 3px;
      }

      .canvas-fps {
        position: absolute;
        bottom: 5px;
        right: 5px;
        background: rgba(0, 123, 255, 0.9);
        color: #fff;
        padding: 3px 8px;
        font-size: 11px;
        border-radius: 3px;
        font-weight: bold;
      }

      .status {
        max-width: 1400px;
        margin: 20px auto;
        text-align: center;
        padding: 15px;
        background: #2a2a2a;
        border-radius: 8px;
        font-size: 14px;
        color: #888;
      }

      .status.error {
        background: #5a1a1a;
        color: #ff6b6b;
      }

      .status.success {
        background: #1a5a1a;
        color: #6bff6b;
      }

      @media (max-width: 1200px) {
        .canvas-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (max-width: 768px) {
        .canvas-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🎬 DotLottie Renderer Benchmark</h1>
      <div class="subtitle">
        Performance comparison across Software, WebGL, and WebGPU renderers
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>Renderer</label>
        <select id="rendererSelect">
          <option value="software">Software (CPU)</option>
          <option value="webgl">WebGL</option>
          <option value="webgpu">WebGPU</option>
        </select>
      </div>

      <div class="control-group">
        <label>Animation Pool</label>
        <input
          type="text"
          id="animationCount"
          value="1 animation loaded"
          disabled
          style="min-width: 200px"
        />
      </div>

      <button id="startBtn">Start Benchmark</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>

    <div class="stats-panel">
      <div class="stat-card">
        <div class="stat-label">Average FPS</div>
        <div class="stat-value">
          <span id="avgFps">0</span><span class="stat-unit">fps</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Min FPS</div>
        <div class="stat-value">
          <span id="minFps">0</span><span class="stat-unit">fps</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Max FPS</div>
        <div class="stat-value">
          <span id="maxFps">0</span><span class="stat-unit">fps</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Frame Time</div>
        <div class="stat-value">
          <span id="avgFrameTime">0</span><span class="stat-unit">ms</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Load Time</div>
        <div class="stat-value">
          <span id="loadTime">0</span><span class="stat-unit">ms</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Memory Usage</div>
        <div class="stat-value">
          <span id="memoryUsage">0</span><span class="stat-unit">MB</span>
        </div>
      </div>
    </div>

    <div class="canvas-grid" id="canvasGrid"></div>

    <div class="status" id="status">
      Select a renderer and click "Start Benchmark" to begin
    </div>

    <script type="module">
      // Number of instances per renderer type
      // NOTE: Software renderer has a bug with many instances - only first 2 and last 1 render
      const RENDERER_INSTANCES = {
        software: 5, // Reduced due to rendering bug with multiple instances
        webgl: 5,
        webgpu: 5,
      };
      const CANVAS_SIZE = 256;

      // Animation pool - randomly selected for each instance
      // Supports both .json (Lottie JSON) and .lottie (DotLottie) files
      // Can be local paths or remote URLs
      // const ANIMATION_URLS = [
      //   "./examples/demo-player/src/box.lottie",
      //   "https://lottie.host/c355fe0c-fdcb-480d-a5d7-76b275bc0850/gStphE6fEA.lottie",
      //   "https://lottie.host/4c966f0d-a921-403a-b941-427b40fb7ee9/MpGMDlSQ3n.lottie",
      //   "https://lottie.host/9e871b98-f7ee-4327-9814-0f31312c26af/69DwqWKndF.lottie",
      //   "https://lottie.host/ccdbcc77-ffb6-4c55-9bc7-55a1f073b794/B1cAmm8Zj6.lottie",
      //   "./examples/demo-player/src/bouncy_ball.json",
      //   "https://lottie.host/9a5a6605-fc90-4935-8d10-9df4c83902ff/PFUKH53LJk.lottie",
      //   "https://lottie.host/9af07d1a-98f2-45ab-8c94-253ed29722a3/zSNNQBgkWu.json",
      //   "https://lottie.host/89a150dc-0830-44c3-9e00-f0caa36af94e/3UJmtNq2Nu.json",
      // ];
      const ANIMATION_URLS = [
        //"./examples/demo-player/src/lottie_story.lottie",
        "/dotlottie-rs/assets/animations/lottie/bouncy_ball.json",
      ];

      // Module paths for each renderer
      const MODULE_PATHS = {
        software: "./release/wasm/dotlottie_player.js",
        webgl: "./release/wasm-webgl/dotlottie_player.js",
        webgpu: "./release/wasm-webgpu/dotlottie_player.js",
      };

      const WASM_PATHS = {
        software: "release/wasm/",
        webgl: "release/wasm-webgl/",
        webgpu: "release/wasm-webgpu/",
      };

      // Benchmark state
      let Module;
      let currentRenderer = null;
      let players = [];
      let animationFrameId = null;
      let fpsCounters = [];
      let cachedAnimations = []; // Cache all animation data
      let webgpuDevice = null; // Store WebGPU device for initialization
      let stats = {
        fps: [],
        frameTimes: [],
        loadTime: 0,
        startTime: 0,
      };

      // Helper: Allocate UTF-8 string in WASM memory
      function allocateUTF8(module, str) {
        const encoder = new TextEncoder();
        const bytes = encoder.encode(str + "\0");
        const ptr = module._malloc(bytes.length);
        module.HEAPU8.set(bytes, ptr);
        return ptr;
      }

      // Helper: Update status message
      function setStatus(message, type = "info") {
        const statusEl = document.getElementById("status");
        statusEl.textContent = message;
        statusEl.className = `status ${type}`;
      }

      // Helper: Mark a canvas as failed
      function markCanvasFailed(index) {
        const canvas = document.getElementById(`canvas-${index}`);
        if (canvas && canvas.parentElement) {
          canvas.parentElement.classList.add("failed");
          const label = canvas.parentElement.querySelector(".canvas-label");
          if (label) {
            label.textContent = `#${index + 1} (failed)`;
          }
        }
      }

      // Initialize canvas grid
      function initializeCanvasGrid(numInstances) {
        const grid = document.getElementById("canvasGrid");
        grid.innerHTML = "";
        grid.className =
          numInstances === 1 ? "canvas-grid single" : "canvas-grid";

        // Reset FPS counters
        fpsCounters = [];

        for (let i = 0; i < numInstances; i++) {
          const wrapper = document.createElement("div");
          wrapper.className = "canvas-wrapper";

          const canvas = document.createElement("canvas");
          canvas.id = `canvas-${i}`;
          canvas.width = CANVAS_SIZE;
          canvas.height = CANVAS_SIZE;

          const label = document.createElement("div");
          label.className = "canvas-label";
          label.textContent = numInstances === 1 ? "Player" : `#${i + 1}`;

          const fpsLabel = document.createElement("div");
          fpsLabel.className = "canvas-fps";
          fpsLabel.id = `fps-${i}`;
          fpsLabel.textContent = "0 fps";

          wrapper.appendChild(canvas);
          wrapper.appendChild(label);
          wrapper.appendChild(fpsLabel);
          grid.appendChild(wrapper);

          // Initialize FPS counter
          fpsCounters[i] = {
            frames: 0,
            lastTime: performance.now(),
            fps: 0,
          };
        }
      }

      // Software renderer
      async function setupSoftwareRenderer(index) {
        console.log(`=== SETUP START: Software renderer ${index} ===`);
        try {
          const canvas = document.getElementById(`canvas-${index}`);
          const ctx = canvas.getContext("2d");
          const width = canvas.width;
          const height = canvas.height;

          console.log(`[SW ${index}] Canvas dimensions: ${width}x${height}`);

          // Create player
          const configPtr = Module._malloc(256);
          Module._dotlottie_init_config(configPtr);
          const player = Module._dotlottie_new_player(configPtr);
          Module._free(configPtr);

          if (player === 0) {
            throw new Error(`Failed to create player ${index}`);
          }

          console.log(`[SW ${index}] Player created: ${player}`);

          // Allocate buffer
          const bufferSize = width * height * 4;
          const bufferPtr = Module._malloc(bufferSize);

          // Clear buffer to transparent black
          Module.HEAPU8.fill(0, bufferPtr, bufferPtr + bufferSize);

          console.log(
            `[SW ${index}] Buffer allocated: 0x${bufferPtr.toString(
              16
            )}, size: ${bufferSize}`
          );

          // Set software target
          const colorSpace = 1; // ABGR8888S
          const stride = width; // stride in pixels, not bytes
          const setTargetResult = Module._dotlottie_set_sw_target(
            player,
            bufferPtr,
            stride,
            width,
            height,
            colorSpace
          );

          if (setTargetResult !== 0) {
            throw new Error(
              `Failed to set software rendering target for canvas ${index}, error code: ${setTargetResult}`
            );
          }

          console.log(`[SW ${index}] Software target set successfully`);
          console.log(
            `[SW ${index}] Config: width=${width}, height=${height}, stride=${stride}, colorSpace=${colorSpace}, bufferSize=${bufferSize}`
          );

          // Randomly select an animation from the cache
          const animationIndex = Math.floor(
            Math.random() * cachedAnimations.length
          );
          const animation = cachedAnimations[animationIndex];
          console.log(
            `[SW ${index}] Loading animation ${animationIndex + 1}/${
              cachedAnimations.length
            }`
          );
          console.log(`[SW ${index}] URL: ${animation.url}`);

          let animationPtr;
          let loadResult;

          if (animation.isDotLottie) {
            // For .lottie files: allocate buffer and copy binary data
            console.log(
              `[SW ${index}] Processing .lottie file, size: ${animation.data.byteLength} bytes`
            );
            const byteArray = new Uint8Array(animation.data);
            animationPtr = Module._malloc(byteArray.length);
            Module.HEAPU8.set(byteArray, animationPtr);
            console.log(
              `[SW ${index}] Binary data copied to 0x${animationPtr.toString(
                16
              )}`
            );

            // Returns exit status: 0 = success, non-zero = error
            console.log(`[SW ${index}] Calling load_dotlottie_data...`);
            loadResult = Module._dotlottie_load_dotlottie_data(
              player,
              animationPtr,
              byteArray.length,
              width,
              height
            );
            console.log(
              `[SW ${index}] load_dotlottie_data returned: ${loadResult}`
            );

            if (loadResult !== 0) {
              Module._free(animationPtr);
              throw new Error(
                `Failed to load .lottie file for canvas ${index}, error code: ${loadResult}, URL: ${animation.url}`
              );
            }

            console.log(`[SW ${index}] .lottie file loaded successfully`);
          } else {
            // For .json files: allocate string and use animation data API
            console.log(
              `[SW ${index}] Processing .json file, length: ${animation.data.length} chars`
            );
            animationPtr = allocateUTF8(Module, animation.data);
            console.log(
              `[SW ${index}] JSON string copied to 0x${animationPtr.toString(
                16
              )}`
            );

            // Returns exit status: 0 = success, non-zero = error
            console.log(`[SW ${index}] Calling load_animation_data...`);
            loadResult = Module._dotlottie_load_animation_data(
              player,
              animationPtr,
              width,
              height
            );
            console.log(
              `[SW ${index}] load_animation_data returned: ${loadResult}`
            );

            if (loadResult !== 0) {
              Module._free(animationPtr);
              throw new Error(
                `Failed to load animation data for canvas ${index}, error code: ${loadResult}`
              );
            }
          }
          console.log(`[SW ${index}] Animation loaded successfully`);

          // Don't free the pointer yet - ThorVG might need it
          // We'll free it in cleanup
          console.log(`[SW ${index}] Animation loaded successfully`);

          // Verify animation is loaded
          const isLoaded = Module._dotlottie_is_loaded(player);
          console.log(`[SW ${index}] Is loaded check: ${isLoaded}`);

          // Start playing
          const playResult = Module._dotlottie_play(player);
          if (playResult !== 0) {
            throw new Error(
              `Failed to start playback for canvas ${index}, error code: ${playResult}`
            );
          }

          // Verify playing
          const isPlaying = Module._dotlottie_is_playing(player);
          console.log(
            `[SW ${index}] Playback started, is_playing: ${isPlaying}`
          );

          return {
            player,
            bufferPtr,
            animationPtr,
            render: () => {
              const startTime = performance.now();

              // Check if animation is complete and should loop
              const isComplete = Module._dotlottie_is_complete(player);
              if (isComplete === 1) {
                Module._dotlottie_seek(player, 0);
                Module._dotlottie_play(player);
              }

              // Tick the animation
              const tickResult = Module._dotlottie_tick(player);

              // Log errors only for the first few frames
              if (tickResult !== 0 && fpsCounters[index].frames < 5) {
                console.error(`[SW ${index}] Tick failed: ${tickResult}`);
              }

              // Debug: Check if buffer has any non-zero data (first render only)
              if (fpsCounters[index].frames === 0) {
                const bufferView = Module.HEAPU8.subarray(
                  bufferPtr,
                  bufferPtr + Math.min(1000, bufferSize)
                );
                const hasData = bufferView.some((byte) => byte !== 0);
                console.log(
                  `[SW ${index}] First frame - buffer has data: ${hasData}, first 10 bytes: [${Array.from(
                    bufferView.slice(0, 10)
                  ).join(", ")}]`
                );
              }

              // Copy buffer to canvas
              // IMPORTANT: Always get fresh view of HEAPU8 in case memory grew
              const bufferView = new Uint8ClampedArray(
                Module.HEAPU8.buffer,
                bufferPtr,
                bufferSize
              );
              const imageData = new ImageData(bufferView, width, height);
              ctx.putImageData(imageData, 0, 0);

              return performance.now() - startTime;
            },
            cleanup: () => {
              Module._dotlottie_destroy(player);
              Module._free(bufferPtr);
              Module._free(animationPtr);
            },
          };
        } catch (error) {
          console.error(`[SW ${index}] Setup failed:`, error);
          throw error;
        }
      }

      // WebGL renderer
      async function setupWebGLRenderer(index) {
        const canvas = document.getElementById(`canvas-${index}`);
        const width = canvas.width;
        const height = canvas.height;

        // Create WebGL context
        const canvasSelector = `#canvas-${index}`;
        const selectorPtr = allocateUTF8(Module, canvasSelector);
        const webglContext =
          Module._dotlottie_webgl_context_create(selectorPtr);
        Module._free(selectorPtr);

        if (webglContext === 0) {
          throw new Error(`Failed to create WebGL context for canvas ${index}`);
        }

        Module._dotlottie_webgl_context_make_current(webglContext);

        // Create player
        const configPtr = Module._malloc(256);
        Module._dotlottie_init_config(configPtr);
        const player = Module._dotlottie_new_player(configPtr);
        Module._free(configPtr);

        if (player === 0) {
          throw new Error(`Failed to create player ${index}`);
        }

        // Set WebGL target
        const colorSpace = 1; // ABGR8888S (required for WebGL)
        const setTargetResult = Module._dotlottie_set_gl_target(
          player,
          webglContext,
          0,
          width,
          height
        );

        if (setTargetResult !== 0) {
          throw new Error(
            `Failed to set WebGL rendering target for canvas ${index}, error code: ${setTargetResult}`
          );
        }

        // Randomly select an animation from the cache
        const animationIndex = Math.floor(
          Math.random() * cachedAnimations.length
        );
        const animation = cachedAnimations[animationIndex];
        console.log(
          `[GL ${index}] Loading animation ${animationIndex + 1}/${
            cachedAnimations.length
          }`
        );
        console.log(`[GL ${index}] URL: ${animation.url}`);

        let animationPtr;
        let loadResult;

        if (animation.isDotLottie) {
          // For .lottie files: allocate buffer and copy binary data
          const byteArray = new Uint8Array(animation.data);
          animationPtr = Module._malloc(byteArray.length);
          Module.HEAPU8.set(byteArray, animationPtr);

          // Returns exit status: 0 = success, non-zero = error
          loadResult = Module._dotlottie_load_dotlottie_data(
            player,
            animationPtr,
            byteArray.length,
            width,
            height
          );

          if (loadResult !== 0) {
            Module._free(animationPtr);
            throw new Error(
              `Failed to load .lottie file for canvas ${index}, error code: ${loadResult}`
            );
          }
        } else {
          // For .json files: allocate string and use animation data API
          animationPtr = allocateUTF8(Module, animation.data);

          // Returns exit status: 0 = success, non-zero = error
          loadResult = Module._dotlottie_load_animation_data(
            player,
            animationPtr,
            width,
            height
          );

          if (loadResult !== 0) {
            Module._free(animationPtr);
            throw new Error(
              `Failed to load animation data for canvas ${index}, error code: ${loadResult}`
            );
          }
        }

        // Start playing
        const playResult = Module._dotlottie_play(player);
        if (playResult !== 0) {
          Module._free(animationPtr);
          throw new Error(
            `Failed to start playback for canvas ${index}, error code: ${playResult}`
          );
        }

        return {
          player,
          webglContext,
          animationPtr,
          render: () => {
            const startTime = performance.now();

            Module._dotlottie_webgl_context_make_current(webglContext);

            // Check if animation is complete and should loop
            const isComplete = Module._dotlottie_is_complete(player);
            if (isComplete === 1) {
              Module._dotlottie_seek(player, 0);
              Module._dotlottie_play(player);
            }

            Module._dotlottie_tick(player);

            return performance.now() - startTime;
          },
          cleanup: () => {
            Module._dotlottie_destroy(player);
            Module._dotlottie_webgl_context_destroy(webglContext);
            Module._free(animationPtr);
          },
        };
      }

      // WebGPU renderer
      async function setupWebGPURenderer(index) {
        const canvas = document.getElementById(`canvas-${index}`);
        const width = canvas.width;
        const height = canvas.height;

        // Get WebGPU resources
        const device = Module._dotlottie_webgpu_get_device();
        const instance = Module._dotlottie_webgpu_get_instance();

        const canvasSelector = `#canvas-${index}`;
        const selectorPtr = allocateUTF8(Module, canvasSelector);
        const surface = Module._dotlottie_webgpu_get_surface(selectorPtr);
        Module._free(selectorPtr);

        if (surface === 0) {
          throw new Error(
            `Failed to create WebGPU surface for canvas ${index}`
          );
        }

        // Create player
        const configPtr = Module._malloc(256);
        Module._dotlottie_init_config(configPtr);
        const player = Module._dotlottie_new_player(configPtr);
        Module._free(configPtr);

        if (player === 0) {
          throw new Error(`Failed to create player ${index}`);
        }

        // Set WebGPU target
        const colorSpace = 1; // ABGR8888S
        const setTargetResult = Module._dotlottie_set_wg_target(
          player,
          device,
          instance,
          surface,
          width,
          height
        );

        if (setTargetResult !== 0) {
          throw new Error(
            `Failed to set WebGPU rendering target for canvas ${index}, error code: ${setTargetResult}`
          );
        }

        // Randomly select an animation from the cache
        const animationIndex = Math.floor(
          Math.random() * cachedAnimations.length
        );
        const animation = cachedAnimations[animationIndex];
        console.log(
          `[GPU ${index}] Loading animation ${animationIndex + 1}/${
            cachedAnimations.length
          }`
        );
        console.log(`[GPU ${index}] URL: ${animation.url}`);

        let animationPtr;
        let loadResult;

        if (animation.isDotLottie) {
          // For .lottie files: allocate buffer and copy binary data
          const byteArray = new Uint8Array(animation.data);
          animationPtr = Module._malloc(byteArray.length);
          Module.HEAPU8.set(byteArray, animationPtr);

          // Returns exit status: 0 = success, non-zero = error
          loadResult = Module._dotlottie_load_dotlottie_data(
            player,
            animationPtr,
            byteArray.length,
            width,
            height
          );

          if (loadResult !== 0) {
            Module._free(animationPtr);
            throw new Error(
              `Failed to load .lottie file for canvas ${index}, error code: ${loadResult}`
            );
          }
        } else {
          // For .json files: allocate string and use animation data API
          animationPtr = allocateUTF8(Module, animation.data);

          // Returns exit status: 0 = success, non-zero = error
          loadResult = Module._dotlottie_load_animation_data(
            player,
            animationPtr,
            width,
            height
          );

          if (loadResult !== 0) {
            Module._free(animationPtr);
            throw new Error(
              `Failed to load animation data for canvas ${index}, error code: ${loadResult}`
            );
          }
        }

        // Start playing
        const playResult = Module._dotlottie_play(player);
        if (playResult !== 0) {
          Module._free(animationPtr);
          throw new Error(
            `Failed to start playback for canvas ${index}, error code: ${playResult}`
          );
        }

        return {
          player,
          surface,
          animationPtr,
          render: () => {
            const startTime = performance.now();

            // Check if animation is complete and should loop
            const isComplete = Module._dotlottie_is_complete(player);
            if (isComplete === 1) {
              Module._dotlottie_seek(player, 0);
              Module._dotlottie_play(player);
            }

            Module._dotlottie_tick(player);

            return performance.now() - startTime;
          },
          cleanup: () => {
            Module._dotlottie_destroy(player);
            Module._dotlottie_wgpu_surface_release(surface);
            Module._free(animationPtr);
          },
        };
      }

      // Update FPS display for individual canvas
      function updateFPS(index, frameTime) {
        const counter = fpsCounters[index];
        counter.frames++;

        const now = performance.now();
        const elapsed = now - counter.lastTime;

        if (elapsed >= 1000) {
          counter.fps = Math.round((counter.frames * 1000) / elapsed);
          counter.frames = 0;
          counter.lastTime = now;

          document.getElementById(
            `fps-${index}`
          ).textContent = `${counter.fps} fps`;
        }

        // Track for aggregate stats
        stats.frameTimes.push(frameTime);
        if (counter.fps > 0) {
          stats.fps.push(counter.fps);
        }
      }

      // Update aggregate statistics
      function updateAggregateStats() {
        if (stats.fps.length > 0) {
          const avgFps =
            stats.fps.reduce((a, b) => a + b, 0) / stats.fps.length;
          const minFps = Math.min(...stats.fps);
          const maxFps = Math.max(...stats.fps);

          document.getElementById("avgFps").textContent = avgFps.toFixed(1);
          document.getElementById("minFps").textContent = minFps;
          document.getElementById("maxFps").textContent = maxFps;
        }

        if (stats.frameTimes.length > 0) {
          const avgFrameTime =
            stats.frameTimes.reduce((a, b) => a + b, 0) /
            stats.frameTimes.length;
          document.getElementById("avgFrameTime").textContent =
            avgFrameTime.toFixed(2);
        }

        // Memory usage (if available)
        if (performance.memory) {
          const memoryMB = (
            performance.memory.usedJSHeapSize /
            1024 /
            1024
          ).toFixed(1);
          document.getElementById("memoryUsage").textContent = memoryMB;
        }

        // Clear stats arrays periodically to avoid memory buildup
        if (stats.fps.length > 1000) {
          stats.fps = stats.fps.slice(-500);
        }
        if (stats.frameTimes.length > 1000) {
          stats.frameTimes = stats.frameTimes.slice(-500);
        }
      }

      // Render loop
      function renderLoop() {
        for (let i = 0; i < players.length; i++) {
          // Skip failed players (null placeholders)
          if (players[i] === null) {
            continue;
          }

          try {
            const frameTime = players[i].render();
            updateFPS(i, frameTime);
          } catch (error) {
            console.error(`Failed to render player ${i}:`, error);
            // Mark as failed so we don't try again
            players[i] = null;
            markCanvasFailed(i);
            // Continue with other players
          }
        }

        updateAggregateStats();

        animationFrameId = requestAnimationFrame(renderLoop);
      }

      // Start benchmark
      async function startBenchmark() {
        const renderer = document.getElementById("rendererSelect").value;
        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");

        try {
          startBtn.disabled = true;
          setStatus("Initializing WASM module...", "info");

          const loadStart = performance.now();

          // Initialize WASM module (re-import if renderer changed)
          if (!Module || currentRenderer !== renderer) {
            // Initialize WebGPU device if needed (before module load)
            if (renderer === "webgpu") {
              if (!navigator.gpu) {
                throw new Error(
                  "WebGPU is not supported in this browser. Please use Chrome 113+ or Edge 113+."
                );
              }

              setStatus("Requesting WebGPU adapter...", "info");
              const adapter = await navigator.gpu.requestAdapter({
                powerPreference: "high-performance",
              });

              if (!adapter) {
                throw new Error("Failed to get WebGPU adapter");
              }

              setStatus("Requesting WebGPU device...", "info");
              webgpuDevice = await adapter.requestDevice();
              console.log("✓ Got WebGPU device");
            }
            const modulePath = MODULE_PATHS[renderer];
            const wasmPath = WASM_PATHS[renderer];

            if (!modulePath) {
              throw new Error(`Unknown renderer: ${renderer}`);
            }

            // Dynamically import the correct module
            const { default: createDotLottiePlayerModule } = await import(
              modulePath
            );

            // Build module options
            const moduleOptions = {
              locateFile: (path) => {
                if (path.endsWith(".wasm")) {
                  return wasmPath + path;
                }
                return path;
              },
            };

            // Pass WebGPU device for WebGPU renderer
            if (renderer === "webgpu" && webgpuDevice) {
              moduleOptions.preinitializedWebGPUDevice = webgpuDevice;
              console.log("✓ Passing WebGPU device to Emscripten");
            }

            Module = await createDotLottiePlayerModule(moduleOptions);

            currentRenderer = renderer;
          }

          // Get number of instances for this renderer
          const numInstances = RENDERER_INSTANCES[renderer] || 1;
          console.log(`Renderer: ${renderer}, Instances: ${numInstances}`);

          // Initialize canvas grid
          initializeCanvasGrid(numInstances);

          // Fetch all animations and cache them
          setStatus("Loading animations...", "info");
          cachedAnimations = [];

          for (let i = 0; i < ANIMATION_URLS.length; i++) {
            const url = ANIMATION_URLS[i];
            setStatus(
              `Loading animation ${i + 1}/${ANIMATION_URLS.length}...`,
              "info"
            );

            // Determine if it's a .lottie (binary) or .json (text) file
            const isDotLottie = url.toLowerCase().endsWith(".lottie");

            const response = await fetch(url);
            if (!response.ok) {
              throw new Error(
                `Failed to fetch animation from ${url}: ${response.status} ${response.statusText}`
              );
            }

            let data;
            if (isDotLottie) {
              // Fetch as binary ArrayBuffer for .lottie files
              data = await response.arrayBuffer();
              console.log(
                `✓ Cached animation ${i + 1}: ${url} (.lottie, ${
                  data.byteLength
                } bytes)`
              );
            } else {
              // Fetch as text for .json files
              data = await response.text();
              console.log(
                `✓ Cached animation ${i + 1}: ${url} (.json, ${
                  data.length
                } bytes)`
              );
            }

            cachedAnimations.push({ data, isDotLottie, url });
          }

          console.log(`✓ All ${cachedAnimations.length} animations cached`);

          // Update UI to show animation count
          const animCountInput = document.getElementById("animationCount");
          animCountInput.value = `${cachedAnimations.length} animation${
            cachedAnimations.length !== 1 ? "s" : ""
          } loaded`;

          // Reset stats
          stats = {
            fps: [],
            frameTimes: [],
            loadTime: 0,
            startTime: performance.now(),
          };

          setStatus(
            `Setting up ${numInstances} ${renderer} renderers...`,
            "info"
          );

          // Setup renderers based on selection
          let setupFunction;
          switch (renderer) {
            case "software":
              setupFunction = setupSoftwareRenderer;
              break;
            case "webgl":
              setupFunction = setupWebGLRenderer;
              break;
            case "webgpu":
              setupFunction = setupWebGPURenderer;
              break;
            default:
              throw new Error("Invalid renderer selected");
          }

          // Create all player instances
          players = [];
          let successCount = 0;
          let failCount = 0;

          for (let i = 0; i < numInstances; i++) {
            setStatus(
              `Setting up ${renderer} renderer ${i + 1}/${numInstances}...`,
              "info"
            );
            console.log(`Starting setup for instance ${i}...`);

            try {
              const player = await setupFunction(i);
              console.log(`Completed setup for instance ${i}`);
              players.push(player);
              successCount++;
            } catch (error) {
              console.error(`Failed to setup instance ${i}:`, error);
              // Push null placeholder to maintain index alignment
              players.push(null);
              markCanvasFailed(i);
              failCount++;
            }
          }

          console.log(
            `Setup complete: ${successCount} succeeded, ${failCount} failed`
          );

          if (successCount === 0) {
            throw new Error(
              `All ${numInstances} instances failed to initialize`
            );
          }

          stats.loadTime = performance.now() - loadStart;
          document.getElementById("loadTime").textContent =
            stats.loadTime.toFixed(0);

          const statusMessage =
            failCount > 0
              ? `Benchmark running: ${successCount}/${numInstances} ${renderer} instances (${failCount} failed)`
              : `Benchmark running with ${successCount} ${renderer} ${
                  successCount === 1 ? "instance" : "instances"
                }`;

          setStatus(statusMessage, failCount > 0 ? "info" : "success");

          // Start render loop
          renderLoop();

          stopBtn.disabled = false;
        } catch (error) {
          console.error("Benchmark error:", error);
          setStatus(`Error: ${error.message}`, "error");
          startBtn.disabled = false;
        }
      }

      // Stop benchmark
      function stopBenchmark() {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }

        // Cleanup players
        for (const player of players) {
          if (player && player.cleanup) {
            try {
              player.cleanup();
            } catch (error) {
              console.error("Error during cleanup:", error);
            }
          }
        }
        players = [];

        // Clear cached animations
        cachedAnimations = [];

        // Clear WebGPU device (will be recreated on next start)
        webgpuDevice = null;

        // Reset UI
        document.getElementById("startBtn").disabled = false;
        document.getElementById("stopBtn").disabled = true;
        setStatus("Benchmark stopped", "info");
      }

      // Event listeners
      document
        .getElementById("startBtn")
        .addEventListener("click", startBenchmark);
      document
        .getElementById("stopBtn")
        .addEventListener("click", stopBenchmark);

      // Cleanup on page unload
      window.addEventListener("beforeunload", stopBenchmark);
    </script>
  </body>
</html>
