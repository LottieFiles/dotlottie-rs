[package]
name = "dotlottie-rs"
version = "0.1.56"
edition = "2021"
description = "A high-performance Lottie and dotLottie player built with Rust"
license = "MIT"
repository = "https://github.com/LottieFiles/dotlottie-rs"
homepage = "https://github.com/LottieFiles/dotlottie-rs"
keywords = ["lottie", "dotlottie", "animation", "graphics", "rendering"]
categories = ["graphics", "multimedia", "rendering"]
links = "thorvg"

[lib]
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
default = ["dotlottie", "state-machines", "theming"]
dev = ["tvg", "tvg-sw", "tvg-lottie-expressions", "tvg-threads", "tvg-png", "tvg-jpg", "tvg-webp", "tvg-ttf", "c_api"]
c_api = ["dep:bitflags"]
tvg = []
tvg-log = []
tvg-sw = ["tvg"]
tvg-wg = ["tvg"]
tvg-gl = ["tvg"]
tvg-lottie-expressions = []
tvg-jpg = []
tvg-png = []
tvg-webp = []
tvg-ttf = []
tvg-threads = []
tvg-simd = []
dotlottie = ["dep:zip"]
state-machines = ["dotlottie"]
theming = ["dotlottie"]
wasm = []                                       # base: enables libc/C++ stubs for wasm32-unknown-unknown
wasm-bindgen-api = ["wasm"]                     # OOP JS wrapper via wasm-bindgen; implies wasm
webgl = ["wasm-bindgen-api", "web-sys/WebGl2RenderingContext", "web-sys/WebGlBuffer", "web-sys/WebGlFramebuffer", "web-sys/WebGlProgram", "web-sys/WebGlRenderbuffer", "web-sys/WebGlShader", "web-sys/WebGlTexture", "web-sys/WebGlUniformLocation", "web-sys/WebGlVertexArrayObject"]
webgpu = ["wasm-bindgen-api", "web-sys/Gpu", "web-sys/GpuAdapter", "web-sys/GpuAddressMode", "web-sys/GpuBindGroup", "web-sys/GpuBindGroupDescriptor", "web-sys/GpuBindGroupEntry", "web-sys/GpuBindGroupLayout", "web-sys/GpuBindGroupLayoutDescriptor", "web-sys/GpuBindGroupLayoutEntry", "web-sys/GpuBlendComponent", "web-sys/GpuBlendFactor", "web-sys/GpuBlendOperation", "web-sys/GpuBlendState", "web-sys/GpuBuffer", "web-sys/GpuBufferBinding", "web-sys/GpuBufferBindingLayout", "web-sys/GpuBufferBindingType", "web-sys/GpuBufferDescriptor", "web-sys/GpuCanvasContext", "web-sys/GpuCanvasConfiguration", "web-sys/GpuColorDict", "web-sys/GpuColorTargetState", "web-sys/GpuCommandBuffer", "web-sys/GpuCommandBufferDescriptor", "web-sys/GpuCommandEncoder", "web-sys/GpuCommandEncoderDescriptor", "web-sys/GpuCompareFunction", "web-sys/GpuComputePassDescriptor", "web-sys/GpuComputePassEncoder", "web-sys/GpuComputePassTimestampWrites", "web-sys/GpuComputePipeline", "web-sys/GpuComputePipelineDescriptor", "web-sys/GpuCullMode", "web-sys/GpuDepthStencilState", "web-sys/GpuDevice", "web-sys/GpuDeviceDescriptor", "web-sys/GpuExtent3dDict", "web-sys/GpuFilterMode", "web-sys/GpuFragmentState", "web-sys/GpuFrontFace", "web-sys/GpuIndexFormat", "web-sys/GpuLoadOp", "web-sys/GpuMipmapFilterMode", "web-sys/GpuMultisampleState", "web-sys/GpuPrimitiveState", "web-sys/GpuPrimitiveTopology", "web-sys/GpuPipelineLayout", "web-sys/GpuPipelineLayoutDescriptor", "web-sys/GpuProgrammableStage", "web-sys/GpuQuerySet", "web-sys/GpuQueue", "web-sys/GpuRenderPassColorAttachment", "web-sys/GpuRenderPassDepthStencilAttachment", "web-sys/GpuRenderPassDescriptor", "web-sys/GpuRenderPassEncoder", "web-sys/GpuRenderPassTimestampWrites", "web-sys/GpuRenderPipeline", "web-sys/GpuRenderPipelineDescriptor", "web-sys/GpuSampler", "web-sys/GpuSamplerBindingLayout", "web-sys/GpuSamplerBindingType", "web-sys/GpuSamplerDescriptor", "web-sys/GpuShaderModule", "web-sys/GpuShaderModuleDescriptor", "web-sys/GpuStencilFaceState", "web-sys/GpuStencilOperation", "web-sys/GpuStorageTextureAccess", "web-sys/GpuStorageTextureBindingLayout", "web-sys/GpuStoreOp", "web-sys/GpuTexelCopyBufferInfo", "web-sys/GpuTexelCopyBufferLayout", "web-sys/GpuTexelCopyTextureInfo", "web-sys/GpuTexture", "web-sys/GpuTextureAspect", "web-sys/GpuTextureBindingLayout", "web-sys/GpuTextureDescriptor", "web-sys/GpuTextureDimension", "web-sys/GpuTextureFormat", "web-sys/GpuTextureSampleType", "web-sys/GpuTextureView", "web-sys/GpuTextureViewDescriptor", "web-sys/GpuTextureViewDimension", "web-sys/GpuVertexAttribute", "web-sys/GpuVertexBufferLayout", "web-sys/GpuVertexFormat", "web-sys/GpuVertexState", "web-sys/GpuVertexStepMode"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[dependencies]
serde_json = { version = "1.0", default-features = false, features = ["preserve_order"] }
serde = { version = "1.0", features = ["derive"] }
zip = { version = "2.4.2", default-features = false, features = ["deflate"], optional = true }
bitflags = { version = "2.6", optional = true }

[target.wasm32-unknown-unknown.dependencies]
wasm-bindgen = "0.2.100"
js-sys = "0.3"
nostd-printf = "0.1.4"
web-sys = { version = "=0.3.77", optional = true }

[build-dependencies]
bindgen = "0.72.0"
cbindgen = "0.29.2"
cc = "1.2"
minreq = { version = "2.14.1", features = ["https-native"] }
zip = { version = "2.4.2", default-features = false, features = ["deflate"] }

[dev-dependencies]
criterion = "0.5.1"
# To test running without default deps: use "dotlottie-rs = { path = ".", default-features = false, features = [] }"
# Using feature flag "dev" will also include the default features.
# This is a workaround to enable this feature only on dev.
dotlottie-rs = { path = ".", features = ["dev"] }
minifb = "0.25"
winit = "0.30"
raw-window-handle = "0.6"
glutin = "0.32"
glutin-winit = "0.5"
gl = "0.14"

[target.'cfg(target_os = "macos")'.dev-dependencies]
core-foundation = "0.9"
objc2 = "0.5"
objc2-foundation = { version = "0.2" }
objc2-app-kit = { version = "0.2", features = ["NSWindow", "NSView", "NSOpenGL"] }
objc2-quartz-core = { version = "0.2", features = ["CAMetalLayer", "CALayer"] }

[profile.release]
lto = "fat"           # Full link-time optimization across all crates
opt-level = 3         # "z" is what's affecting frame rate / performance. Keeping it at 3
strip = "debuginfo"   # Strip debug information
codegen-units = 1     # Better optimization at cost of compile time
panic = "abort"       # Remove panic unwinding infrastructure

[[example]]
name = "opengl"
required-features = ["tvg-gl"]

[[example]]
name = "webgpu"
required-features = ["tvg-wg"]

[[example]]
name = "apply_theme"
required-features = ["theming"]

[[example]]
name = "state_machine"
required-features = ["state-machines"]

[[bench]]
name = "benchmarks"
harness = false
