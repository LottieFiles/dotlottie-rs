<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DotLottie C API - Software Renderer</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .container {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
      }
      canvas {
        display: block;
        width: 100%;
        max-width: 800px;
        border: 2px solid #333;
        border-radius: 4px;
        background: #f0f0f0;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 15px;
      }
      button {
        padding: 8px 16px;
        border: 1px solid #333;
        border-radius: 4px;
        background: white;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: #f0f0f0;
      }
      button:active {
        background: #e0e0e0;
      }
      .info {
        margin-top: 10px;
        padding: 10px;
        background: #f9f9f9;
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
      }
      .status {
        color: #666;
        margin-bottom: 5px;
      }
      .error {
        color: #d00;
        font-weight: bold;
      }
      select,
      input[type="range"] {
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <h1>🎨 DotLottie C API - Software Renderer Demo</h1>

    <div class="container">
      <h2>Animation Canvas</h2>
      <canvas id="canvas" width="800" height="600"></canvas>

      <div class="controls">
        <button id="play">▶️ Play</button>
        <button id="pause">⏸️ Pause</button>
        <button id="stop">⏹️ Stop</button>
        <button id="resize">🔄 Resize</button>

        <label>
          <span>Loop:</span>
          <input type="checkbox" id="loop" checked />
        </label>

        <label>
          <span>Speed:</span>
          <input
            type="range"
            id="speed"
            min="0.1"
            max="3"
            step="0.1"
            value="1"
          />
          <span id="speed-value">1.0x</span>
        </label>
      </div>

      <div class="info">
        <div class="status" id="status">Loading WASM module...</div>
        <div id="frame-info">Frame: 0 / 0</div>
        <div id="fps-info">FPS: 0</div>
      </div>
    </div>

    <script type="module">
      // Import the C API WASM module
      import createDotLottiePlayerModule from "./release/wasm/dotlottie_player.js";

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const frameInfoEl = document.getElementById("frame-info");
      const fpsInfoEl = document.getElementById("fps-info");

      // Helper: Allocate a C string in WASM memory
      function allocateUTF8(Module, str) {
        // Use Emscripten's text encoder or calculate length manually
        const encoder = new TextEncoder();
        const utf8Array = encoder.encode(str);
        const len = utf8Array.length + 1; // +1 for null terminator

        const ptr = Module._malloc(len);

        // Copy string bytes to WASM memory
        const heap = new Uint8Array(Module.HEAPU8.buffer, ptr, len);
        heap.set(utf8Array);
        heap[utf8Array.length] = 0; // Null terminator

        return ptr;
      }

      // Helper: Read a C string from WASM memory
      function readUTF8(Module, ptr, maxLength = 512) {
        if (!ptr) return "";

        // Find null terminator
        let length = 0;
        const heap = Module.HEAPU8;
        while (length < maxLength && heap[ptr + length] !== 0) {
          length++;
        }

        // Decode UTF-8 bytes to string
        const bytes = new Uint8Array(heap.buffer, ptr, length);
        const decoder = new TextDecoder();
        return decoder.decode(bytes);
      }

      async function main() {
        try {
          statusEl.textContent = "Loading WASM module...";

          // Load the WASM module
          const Module = await createDotLottiePlayerModule({
            locateFile: (path) => {
              if (path.endsWith(".wasm")) {
                return "release/wasm/" + path;
              }
              return path;
            },
          });

          statusEl.textContent = "WASM module loaded! Creating player...";
          console.log("✓ WASM Module loaded");

          // ============================================================
          // 1. Initialize player configuration
          // ============================================================

          // Allocate config struct (we'll use the defaults mostly)
          const configPtr = Module._malloc(256); // Allocate enough space for config

          // Initialize with default config
          Module._dotlottie_init_config(configPtr);

          console.log("✓ Config initialized");

          // ============================================================
          // 2. Create the player
          // ============================================================

          const player = Module._dotlottie_new_player(configPtr);

          if (player === 0) {
            throw new Error("Failed to create player (returned null)");
          }

          console.log("✓ Player created:", player);
          statusEl.textContent = "Player created! Loading animation...";

          // ============================================================
          // 3. Allocate frame buffer for software rendering
          // ============================================================

          const width = canvas.width;
          const height = canvas.height;
          const bufferSize = width * height * 4; // RGBA = 4 bytes per pixel
          const bufferPtr = Module._malloc(bufferSize);

          console.log(
            `✓ Allocated ${bufferSize} bytes for ${width}x${height} buffer`,
          );

          // ============================================================
          // 4. Set software rendering target
          // ============================================================

          // ColorSpace enum: 0 = ABGR8888, 1 = ABGR8888S, 2 = ARGB8888, 3 = ARGB8888S
          const colorSpace = 0; // ABGR8888
          const stride = width; // stride in pixels

          const setTargetResult = Module._dotlottie_set_sw_target(
            player,
            bufferPtr,
            stride,
            width,
            height,
            colorSpace,
          );

          if (setTargetResult !== 0) {
            throw new Error(
              `Failed to set software rendering target, error code: ${setTargetResult}`,
            );
          }

          console.log("✓ Software rendering target set");

          // ============================================================
          // 5. Load animation data
          // ============================================================

          // Fetch a sample Lottie animation
          const animationUrl = "./examples/demo-player/src/bouncy_ball.json";
          statusEl.textContent = `Loading animation from ${animationUrl}...`;

          const animationData = await fetch(animationUrl).then((r) => r.text());
          const animationPtr = allocateUTF8(Module, animationData);

          const loadResult = Module._dotlottie_load_animation_data(
            player,
            animationPtr,
            width,
            height,
          );

          Module._free(animationPtr);

          if (loadResult !== 0) {
            // 0 = SUCCESS
            throw new Error("Failed to load animation data");
          }

          console.log("✓ Animation loaded");
          statusEl.textContent = "Animation loaded! Playing...";

          // ============================================================
          // 6. Query animation info
          // ============================================================

          const totalFramesPtr = Module._malloc(4);
          Module._dotlottie_total_frames(player, totalFramesPtr);
          const totalFrames = Module.HEAPF32[totalFramesPtr >> 2];
          Module._free(totalFramesPtr);

          const durationPtr = Module._malloc(4);
          Module._dotlottie_duration(player, durationPtr);
          const duration = Module.HEAPF32[durationPtr >> 2];
          Module._free(durationPtr);

          console.log(
            `✓ Animation info: ${totalFrames} frames, ${duration.toFixed(2)}s`,
          );

          // ============================================================
          // 7. Start playing
          // ============================================================

          Module._dotlottie_play(player);

          // ============================================================
          // 8. Render loop
          // ============================================================

          let lastFrameTime = performance.now();
          let frameCount = 0;
          let fps = 0;
          let shouldLoop = true; // Control looping manually
          let speedMultiplier = 1.0; // Speed control
          let lastTickTime = performance.now();

          function render() {
            const now = performance.now();

            // Check if animation is complete and should loop
            const isComplete = Module._dotlottie_is_complete(player);
            if (isComplete === 1 && shouldLoop) {
              // Animation completed, restart it
              Module._dotlottie_seek(player, 0);
              Module._dotlottie_play(player);
            }

            // Check if we're playing before ticking
            const isPlaying = Module._dotlottie_is_playing(player);

            // Apply speed control: only tick at the adjusted rate
            const timeSinceLastTick = now - lastTickTime;
            const tickInterval = 1000 / 60 / speedMultiplier; // Base 60 FPS adjusted by speed

            let shouldRender = false;
            if (isPlaying === 1 && timeSinceLastTick >= tickInterval) {
              // Tick the animation (updates frame and renders)
              // Returns: 0 = SUCCESS, non-zero = ERROR
              const tickResult = Module._dotlottie_tick(player);
              lastTickTime = now;
              shouldRender = tickResult === 0;
            } else {
              // Not time to tick yet, but still render current frame
              shouldRender = true;
            }

            if (shouldRender) {
              // Get current frame for display
              const currentFramePtr = Module._malloc(4);
              Module._dotlottie_current_frame(player, currentFramePtr);
              const currentFrame = Module.HEAPF32[currentFramePtr >> 2];
              Module._free(currentFramePtr);

              // Copy buffer from WASM memory to canvas
              // The buffer is in RGBA format (or ABGR depending on colorSpace)
              const bufferView = new Uint8ClampedArray(
                Module.HEAPU8.buffer,
                bufferPtr,
                bufferSize,
              );

              const imageData = new ImageData(
                new Uint8ClampedArray(bufferView),
                width,
                height,
              );

              ctx.putImageData(imageData, 0, 0);

              // Update frame info
              frameInfoEl.textContent = `Frame: ${currentFrame.toFixed(1)} / ${totalFrames.toFixed(1)}`;

              // Calculate FPS
              frameCount++;
              if (now - lastFrameTime >= 1000) {
                fps = Math.round((frameCount * 1000) / (now - lastFrameTime));
                fpsInfoEl.textContent = `FPS: ${fps}`;
                frameCount = 0;
                lastFrameTime = now;
              }
            }
            // Note: tickResult can be non-zero when animation completes,
            // which is handled by the isComplete check above

            requestAnimationFrame(render);
          }

          // Start the render loop
          requestAnimationFrame(render);

          console.log("✓ Render loop started");
          statusEl.textContent = "✓ Playing animation";

          // ============================================================
          // 9. UI Controls
          // ============================================================

          document.getElementById("play").addEventListener("click", () => {
            Module._dotlottie_play(player);
            statusEl.textContent = "▶️ Playing";
          });

          document.getElementById("pause").addEventListener("click", () => {
            Module._dotlottie_pause(player);
            statusEl.textContent = "⏸️ Paused";
          });

          document.getElementById("stop").addEventListener("click", () => {
            Module._dotlottie_stop(player);
            statusEl.textContent = "⏹️ Stopped";
          });

          document.getElementById("resize").addEventListener("click", () => {
            const newWidth = canvas.width;
            const newHeight = canvas.height;
            Module._dotlottie_resize(player, newWidth, newHeight);
            console.log(`Resized to ${newWidth}x${newHeight}`);
          });

          document.getElementById("loop").addEventListener("change", (e) => {
            shouldLoop = e.target.checked;
            console.log("Loop:", shouldLoop);
            statusEl.textContent = shouldLoop
              ? "Loop enabled"
              : "Loop disabled";
          });

          document.getElementById("speed").addEventListener("input", (e) => {
            speedMultiplier = parseFloat(e.target.value);
            document.getElementById("speed-value").textContent =
              `${speedMultiplier.toFixed(1)}x`;
            console.log("Speed:", speedMultiplier);
            statusEl.textContent = `Speed: ${speedMultiplier.toFixed(1)}x`;
          });

          // ============================================================
          // 10. Cleanup on page unload
          // ============================================================

          window.addEventListener("beforeunload", () => {
            Module._dotlottie_destroy(player);
            Module._free(bufferPtr);
            Module._free(configPtr);
            console.log("✓ Cleaned up resources");
          });
        } catch (error) {
          console.error("Error:", error);
          statusEl.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
        }
      }

      // Start the app
      main();
    </script>
  </body>
</html>
