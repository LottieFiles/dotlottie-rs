<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DotLottie C API - Unified Renderer Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
        background: #fafafa;
      }

      h1 {
        margin-bottom: 10px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
      }

      .main-controls {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
      }

      .main-controls label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 500;
      }

      .main-controls select {
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        min-width: 150px;
      }

      .main-controls button {
        padding: 10px 20px;
        border: 1px solid #333;
        border-radius: 4px;
        background: #333;
        color: white;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
      }

      .main-controls button:hover {
        background: #555;
      }

      .instances-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
      }

      .instance {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        position: relative;
      }

      .instance-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .instance-title {
        font-weight: 600;
        font-size: 14px;
        color: #333;
      }

      .instance-close {
        background: #f44;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 12px;
      }

      .instance-close:hover {
        background: #d33;
      }

      canvas {
        display: block;
        width: 100%;
        border: 2px solid #333;
        border-radius: 4px;
        background: #f0f0f0;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .controls button {
        padding: 6px 12px;
        border: 1px solid #333;
        border-radius: 4px;
        background: white;
        cursor: pointer;
        font-size: 12px;
      }

      .controls button:hover {
        background: #f0f0f0;
      }

      .controls label {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
      }

      .controls input[type="range"] {
        width: 80px;
      }

      .info {
        margin-top: 8px;
        padding: 8px;
        background: #f9f9f9;
        border-radius: 4px;
        font-family: monospace;
        font-size: 11px;
      }

      .status {
        color: #666;
        margin-bottom: 3px;
      }

      .error {
        color: #d00;
        font-weight: bold;
      }

      .success {
        color: #090;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>🎨 DotLottie C API - Unified Renderer Demo</h1>
    <p class="subtitle">
      Test different renderers and spawn multiple player instances
    </p>

    <div class="main-controls">
      <label>
        <span>Renderer:</span>
        <select id="renderer-select">
          <option value="software">Software Renderer</option>
          <option value="webgl">WebGL Renderer</option>
          <option value="webgpu">WebGPU Renderer</option>
        </select>
      </label>

      <button id="spawn-instance">➕ Spawn New Instance</button>

      <div style="margin-left: auto; color: #666; font-size: 12px">
        <span id="instance-count">0 instances</span>
      </div>
    </div>

    <div id="instances-grid" class="instances-grid"></div>

    <script type="module">
      let instanceCounter = 0;
      const instances = new Map();

      const rendererSelect = document.getElementById("renderer-select");
      const spawnButton = document.getElementById("spawn-instance");
      const instancesGrid = document.getElementById("instances-grid");
      const instanceCountEl = document.getElementById("instance-count");

      // Helper: Allocate a C string in WASM memory
      function allocateUTF8(Module, str) {
        const encoder = new TextEncoder();
        const utf8Array = encoder.encode(str);
        const len = utf8Array.length + 1;
        const ptr = Module._malloc(len);
        const heap = new Uint8Array(Module.HEAPU8.buffer, ptr, len);
        heap.set(utf8Array);
        heap[utf8Array.length] = 0;
        return ptr;
      }

      function updateInstanceCount() {
        const count = instances.size;
        instanceCountEl.textContent = `${count} instance${
          count !== 1 ? "s" : ""
        }`;
      }

      async function createInstance() {
        const renderer = rendererSelect.value;
        const instanceId = ++instanceCounter;

        // Create instance container
        const instanceDiv = document.createElement("div");
        instanceDiv.className = "instance";
        instanceDiv.id = `instance-${instanceId}`;

        const canvas = document.createElement("canvas");
        canvas.width = 400;
        canvas.height = 300;
        canvas.id = `canvas-${instanceId}`;

        instanceDiv.innerHTML = `
          <div class="instance-header">
            <div class="instance-title">Instance #${instanceId} - ${renderer.toUpperCase()}</div>
            <button class="instance-close" data-id="${instanceId}">✕ Close</button>
          </div>
        `;
        instanceDiv.appendChild(canvas);

        const controlsDiv = document.createElement("div");
        controlsDiv.innerHTML = `
          <div class="controls">
            <button class="play" data-id="${instanceId}">▶️</button>
            <button class="pause" data-id="${instanceId}">⏸️</button>
            <button class="stop" data-id="${instanceId}">⏹️</button>
            <label>
              <input type="checkbox" class="loop" data-id="${instanceId}" checked />
              Loop
            </label>
          </div>
          <div class="info">
            <div class="status status-${instanceId}">Initializing...</div>
            <div class="frame-info-${instanceId}">Frame: 0 / 0</div>
            <div class="fps-info-${instanceId}">FPS: 0</div>
          </div>
        `;
        while (controlsDiv.firstChild) {
          instanceDiv.appendChild(controlsDiv.firstChild);
        }

        instancesGrid.appendChild(instanceDiv);

        // Initialize player based on renderer
        try {
          let playerData;
          switch (renderer) {
            case "software":
              playerData = await initSoftwareRenderer(instanceId, canvas);
              break;
            case "webgl":
              playerData = await initWebGLRenderer(instanceId, canvas);
              break;
            case "webgpu":
              playerData = await initWebGPURenderer(instanceId, canvas);
              break;
          }

          instances.set(instanceId, playerData);
          updateInstanceCount();

          // Setup controls
          setupControls(instanceId, playerData);

          // Start render loop
          startRenderLoop(instanceId, playerData);
        } catch (error) {
          console.error(`Failed to create instance ${instanceId}:`, error);
          const statusEl = document.querySelector(`.status-${instanceId}`);
          statusEl.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
        }
      }

      async function initSoftwareRenderer(instanceId, canvas) {
        const statusEl = document.querySelector(`.status-${instanceId}`);
        statusEl.textContent = "Loading WASM module...";

        const createModule = (
          await import("./release/wasm/dotlottie_player.js")
        ).default;

        const Module = await createModule({
          locateFile: (path) =>
            path.endsWith(".wasm") ? "release/wasm/" + path : path,
        });

        statusEl.textContent = "Creating player...";

        if (!Module._dotlottie_set_sw_target) {
          throw new Error(
            "WASM module missing _dotlottie_set_sw_target function",
          );
        }

        const ctx = canvas.getContext("2d");

        const player = Module._dotlottie_new_player(0);

        if (player === 0) throw new Error("Failed to create player");

        console.log(
          `Instance ${instanceId}: Player created, setting up software target`,
        );

        const width = canvas.width;
        const height = canvas.height;
        const bufferSize = width * height * 4;
        const bufferPtr = Module._malloc(bufferSize);

        if (bufferPtr === 0) throw new Error("Failed to allocate buffer");

        console.log(
          `Instance ${instanceId}: Allocated buffer ${bufferSize} bytes for ${width}x${height}`,
        );
        console.log(
          `Instance ${instanceId}: bufferPtr = ${bufferPtr}, player = ${player}`,
        );

        // ColorSpace: 0 = ABGR8888 (matching the Rust forced colorspace)
        const colorSpace = 0;
        const stride = width; // stride in pixels

        console.log(`Instance ${instanceId}: Calling set_sw_target with:`, {
          player,
          bufferPtr,
          stride,
          width,
          height,
          colorSpace,
        });

        const setTargetResult = Module._dotlottie_set_sw_target(
          player,
          bufferPtr,
          width,
          height,
          colorSpace,
        );

        console.log(
          `Instance ${instanceId}: set_sw_target returned: ${setTargetResult}`,
        );

        if (setTargetResult !== 0) {
          throw new Error(
            `Failed to set software target (error code: ${setTargetResult})`,
          );
        }

        console.log(`Instance ${instanceId}: Software target set successfully`);

        // Load animation
        const animationUrl =
          "./dotlottie-rs/assets/animations/lottie/with_audio.json";
        const animationData = await fetch(animationUrl).then((r) => r.text());
        const animationPtr = allocateUTF8(Module, animationData);

        const loadResult = Module._dotlottie_load_animation_data(
          player,
          animationPtr,
          width,
          height,
        );

        Module._free(animationPtr);
        if (loadResult !== 0) throw new Error("Failed to load animation");

        Module._dotlottie_play(player);
        statusEl.innerHTML = '<span class="success">✓ Playing</span>';

        return {
          Module,
          player,
          canvas,
          ctx,
          bufferPtr,
          bufferSize,
          width,
          height,
          renderer: "software",
        };
      }

      async function initWebGLRenderer(instanceId, canvas) {
        const statusEl = document.querySelector(`.status-${instanceId}`);
        statusEl.textContent = "Checking WebGL support...";

        const gl = canvas.getContext("webgl2") || canvas.getContext("webgl");
        if (!gl) throw new Error("WebGL not supported");

        statusEl.textContent = "Loading WASM module...";

        const createModule = (
          await import("./release/wasm-webgl/dotlottie_player.js")
        ).default;

        const Module = await createModule({
          locateFile: (path) =>
            path.endsWith(".wasm") ? "release/wasm-webgl/" + path : path,
          canvas: canvas,
        });

        canvas.id = `canvas-${instanceId}`;
        const canvasSelector = "#" + canvas.id;
        const canvasSelectorPtr = allocateUTF8(Module, canvasSelector);

        const webglContext =
          Module._dotlottie_webgl_context_create(canvasSelectorPtr);
        Module._free(canvasSelectorPtr);

        if (webglContext === 0)
          throw new Error("Failed to create WebGL context");

        const makeCurrentResult =
          Module._dotlottie_webgl_context_make_current(webglContext);
        if (makeCurrentResult !== 0)
          throw new Error("Failed to make WebGL context current");

        const player = Module._dotlottie_new_player(0);

        if (player === 0) throw new Error("Failed to create player");

        const width = canvas.width;
        const height = canvas.height;

        const setTargetResult = Module._dotlottie_set_gl_target(
          player,
          webglContext,
          0,
          width,
          height,
        );

        if (setTargetResult !== 0)
          throw new Error("Failed to set WebGL target");

        // Load animation
        const animationUrl =
          "./dotlottie-rs/assets/animations/lottie/bouncy_ball.json";
        const animationData = await fetch(animationUrl).then((r) => r.text());
        const animationPtr = allocateUTF8(Module, animationData);

        const loadResult = Module._dotlottie_load_animation_data(
          player,
          animationPtr,
          width,
          height,
        );

        Module._free(animationPtr);
        if (loadResult !== 0) throw new Error("Failed to load animation");

        Module._dotlottie_play(player);
        statusEl.innerHTML = '<span class="success">✓ Playing</span>';

        return {
          Module,
          player,
          canvas,
          webglContext,
          width,
          height,
          renderer: "webgl",
        };
      }

      async function initWebGPURenderer(instanceId, canvas) {
        const statusEl = document.querySelector(`.status-${instanceId}`);
        statusEl.textContent = "Checking WebGPU support...";

        if (!navigator.gpu) throw new Error("WebGPU not supported");

        const adapter = await navigator.gpu.requestAdapter({
          powerPreference: "high-performance",
        });
        if (!adapter) throw new Error("Failed to get WebGPU adapter");

        const device = await adapter.requestDevice();
        statusEl.textContent = "Loading WASM module...";

        const createModule = (
          await import("./release/wasm-webgpu/dotlottie_player.js")
        ).default;

        const Module = await createModule({
          locateFile: (path) =>
            path.endsWith(".wasm") ? "release/wasm-webgpu/" + path : path,
          canvas: canvas,
          preinitializedWebGPUDevice: device,
        });

        const player = Module._dotlottie_new_player(0);

        if (player === 0) throw new Error("Failed to create player");

        const deviceHandle = Module._dotlottie_webgpu_get_device();
        const instanceHandle = Module._dotlottie_webgpu_get_instance();

        if (deviceHandle === 0)
          throw new Error("Failed to get WebGPU device from Emscripten");

        canvas.id = `canvas-${instanceId}`;
        const canvasSelector = "#" + canvas.id;
        const canvasSelectorPtr = allocateUTF8(Module, canvasSelector);
        const surfaceHandle =
          Module._dotlottie_webgpu_get_surface(canvasSelectorPtr);
        Module._free(canvasSelectorPtr);

        if (surfaceHandle === 0)
          throw new Error("Failed to create WebGPU surface");

        const width = canvas.width;
        const height = canvas.height;

        const setTargetResult = Module._dotlottie_set_wg_target(
          player,
          deviceHandle,
          instanceHandle,
          surfaceHandle,
          width,
          height,
          0, // target_type: Surface = 0
        );

        if (setTargetResult !== 0)
          throw new Error("Failed to set WebGPU target");

        // Load animation
        const animationUrl =
          "./dotlottie-rs/assets/animations/lottie/bouncy_ball.json";
        const animationData = await fetch(animationUrl).then((r) => r.text());
        const animationPtr = allocateUTF8(Module, animationData);

        const loadResult = Module._dotlottie_load_animation_data(
          player,
          animationPtr,
          width,
          height,
        );

        Module._free(animationPtr);
        if (loadResult !== 0) throw new Error("Failed to load animation");

        Module._dotlottie_play(player);
        statusEl.innerHTML = '<span class="success">✓ Playing</span>';

        return {
          Module,
          player,
          canvas,
          device,
          deviceHandle,
          instanceHandle,
          surfaceHandle,
          width,
          height,
          renderer: "webgpu",
        };
      }

      function setupControls(instanceId, playerData) {
        const { Module, player } = playerData;

        document
          .querySelector(`.play[data-id="${instanceId}"]`)
          .addEventListener("click", () => Module._dotlottie_play(player));

        document
          .querySelector(`.pause[data-id="${instanceId}"]`)
          .addEventListener("click", () => Module._dotlottie_pause(player));

        document
          .querySelector(`.stop[data-id="${instanceId}"]`)
          .addEventListener("click", () => Module._dotlottie_stop(player));

        const loopInput = document.querySelector(
          `.loop[data-id="${instanceId}"]`,
        );
        loopInput.addEventListener("change", (e) => {
          playerData.shouldLoop = e.target.checked;
        });

        document
          .querySelector(`.instance-close[data-id="${instanceId}"]`)
          .addEventListener("click", () => destroyInstance(instanceId));
      }

      function startRenderLoop(instanceId, playerData) {
        const { Module, player, renderer } = playerData;

        playerData.shouldLoop = true;
        playerData.lastTickTime = performance.now();
        playerData.lastFrameTime = performance.now();
        playerData.frameCount = 0;
        playerData.fps = 0;

        const frameInfoEl = document.querySelector(`.frame-info-${instanceId}`);
        const fpsInfoEl = document.querySelector(`.fps-info-${instanceId}`);

        // Get total frames once
        const totalFramesPtr = Module._malloc(4);
        Module._dotlottie_total_frames(player, totalFramesPtr);
        playerData.totalFrames = Module.HEAPF32[totalFramesPtr >> 2];
        Module._free(totalFramesPtr);

        function render() {
          if (!instances.has(instanceId)) return; // Instance was destroyed

          const now = performance.now();
          const isComplete = Module._dotlottie_is_complete(player);

          if (isComplete === 1 && playerData.shouldLoop) {
            Module._dotlottie_seek(player, 0);
            Module._dotlottie_play(player);
          }

          const playbackStatus = Module._dotlottie_playback_status(player);
          const timeSinceLastTick = now - playerData.lastTickTime;
          const tickInterval = 1000 / 60;

          if (playbackStatus === 0 && timeSinceLastTick >= tickInterval) { // 0 = Playing
            Module._dotlottie_tick(player);
            playerData.lastTickTime = now;

            // For software renderer, blit to canvas
            if (renderer === "software") {
              const bufferView = new Uint8ClampedArray(
                Module.HEAPU8.buffer,
                playerData.bufferPtr,
                playerData.bufferSize,
              );
              const imageData = new ImageData(
                new Uint8ClampedArray(bufferView),
                playerData.width,
                playerData.height,
              );
              playerData.ctx.putImageData(imageData, 0, 0);
            }

            // Update frame info
            const currentFramePtr = Module._malloc(4);
            Module._dotlottie_current_frame(player, currentFramePtr);
            const currentFrame = Module.HEAPF32[currentFramePtr >> 2];
            Module._free(currentFramePtr);

            frameInfoEl.textContent = `Frame: ${currentFrame.toFixed(
              1,
            )} / ${playerData.totalFrames.toFixed(1)}`;
          }

          // Calculate FPS
          playerData.frameCount++;
          if (now - playerData.lastFrameTime >= 1000) {
            playerData.fps = Math.round(
              (playerData.frameCount * 1000) / (now - playerData.lastFrameTime),
            );
            fpsInfoEl.textContent = `FPS: ${playerData.fps}`;
            playerData.frameCount = 0;
            playerData.lastFrameTime = now;
          }

          requestAnimationFrame(render);
        }

        requestAnimationFrame(render);
      }

      function destroyInstance(instanceId) {
        const playerData = instances.get(instanceId);
        if (!playerData) return;

        const { Module, player, renderer } = playerData;

        Module._dotlottie_destroy(player);

        if (renderer === "software") {
          Module._free(playerData.bufferPtr);
        } else if (renderer === "webgl") {
          Module._dotlottie_webgl_context_destroy(playerData.webglContext);
        } else if (renderer === "webgpu") {
          if (playerData.surfaceHandle) {
            Module._dotlottie_wgpu_surface_release(playerData.surfaceHandle);
          }
          if (playerData.deviceHandle) {
            Module._dotlottie_wgpu_device_release(playerData.deviceHandle);
          }
          if (playerData.instanceHandle) {
            Module._dotlottie_wgpu_instance_release(playerData.instanceHandle);
          }
        }

        instances.delete(instanceId);

        const instanceDiv = document.getElementById(`instance-${instanceId}`);
        if (instanceDiv) instanceDiv.remove();

        updateInstanceCount();
        console.log(`✓ Instance ${instanceId} destroyed`);
      }

      // Event listeners
      spawnButton.addEventListener("click", createInstance);

      // Spawn initial instance
      createInstance();
    </script>
  </body>
</html>
