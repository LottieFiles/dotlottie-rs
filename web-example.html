<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WASM test</title>
  </head>

  <body>
    <h1>Test</h1>
    <div style="width: 800px">
      <label for="fit">Fit:</label>
      <select id="fit">
        <option value="1" selected>Contain</option>
        <option value="2">Fill</option>
        <option value="3">Cover</option>
        <option value="4">FitWidth</option>
        <option value="5">FitHeight</option>
        <option value="6">None</option>
      </select>
      <label for="align">Align:</label>
      <select id="align">
        <option value="0,0">top-left</option>
        <option value="0.5,0">top-center</option>
        <option value="1,0">top-right</option>

        <option value="0,0.5">center-left</option>
        <option value="0.5,0.5" selected>center</option>
        <option value="1,0.5">center-right</option>

        <option value="0,1">bottom-left</option>
        <option value="0.5,1">bottom-center</option>
        <option value="1,1">bottom-right</option>
      </select>
      <canvas
        style="width: 100%; height: 100%; border: 1px solid black"
      ></canvas>
      <button id="play">play</button>
      <button id="pause">pause</button>
      <button id="resize">resize</button>
      <select id="theme-select">
        <option value="">None</option>
        <option value="theme">Theme</option>
      </select>
      <input
        id="progress-bar"
        type="range"
        min="0"
        max="100"
        defaultValue="0"
        step="0.01"
      />
      <select id="mode">
        <option value="1">Forward</option>
        <option value="2">Reverse</option>
        <option value="3">Bounce</option>
        <option value="4">ReverseBounce</option>
      </select>
    </div>
    <button id="jump">Jump</button>
    <button id="speed-up">speed +</button>
    <button id="speed-down">speed -</button>
    <button id="loop">loopToggle</button>
    <button id="next">Next</button>
    <input id="bg-color" type="color" />
    <div>
      <label for="width">Rendering Area Width:</label>
      <input id="width" type="range" min="0" max="1" step="0.01" value="1" />
      <label for="height">Rendering Area Height:</label>
      <input id="height" type="range" min="0" max="1" step="0.01" value="1" />
    </div>
    <div style="margin-top: 10px">
      <h3>Pan & Zoom Controls</h3>
      <p><strong>Zoom:</strong> Cmd/Ctrl + Scroll wheel</p>
      <p>
        <strong>Pan:</strong> Scroll wheel (or Shift + Mouse drag, or two-finger
        touch drag)
      </p>
      <button id="reset-transform">Reset Pan & Zoom</button>
      <div>
        <span>Transform: </span>
        <span id="transform-display">Identity</span>
      </div>
    </div>
    <script type="module">
      // Import the C API WASM module for software rendering
      import createDotLottiePlayerModule from "./release/wasm/dotlottie_player.js";

      const playBtn = document.querySelector("#play");
      const pauseBtn = document.querySelector("#pause");
      const resizeBtn = document.querySelector("#resize");
      const progressBar = document.querySelector("#progress-bar");
      const jumpBtn = document.querySelector("#jump");
      const modeSelect = document.querySelector("#mode");
      const speedUpBtn = document.querySelector("#speed-up");
      const speedDownBtn = document.querySelector("#speed-down");
      const loopToggle = document.querySelector("#loop");
      const nextBtn = document.querySelector("#next");
      const bgColorInput = document.querySelector("#bg-color");
      const fitSelect = document.querySelector("#fit");
      const alignSelect = document.querySelector("#align");
      const themeSelect = document.querySelector("#theme-select");
      const renderAreaWidthInput = document.querySelector("#width");
      const renderAreaHeightInput = document.querySelector("#height");
      const resetTransformBtn = document.querySelector("#reset-transform");
      const transformDisplay = document.querySelector("#transform-display");

      // Helper: Allocate a C string in WASM memory
      function allocateUTF8(Module, str) {
        const encoder = new TextEncoder();
        const utf8Array = encoder.encode(str);
        const len = utf8Array.length + 1; // +1 for null terminator

        const ptr = Module._malloc(len);

        // Copy string bytes to WASM memory
        const heap = new Uint8Array(Module.HEAPU8.buffer, ptr, len);
        heap.set(utf8Array);
        heap[utf8Array.length] = 0; // Null terminator

        return ptr;
      }

      const Module = await createDotLottiePlayerModule({
        locateFile: (path) => {
          if (path.endsWith(".wasm")) {
            return "release/wasm/" + path;
          }
          return path;
        },
      });

      // ============================================================
      // Initialize player with C API and software renderer
      // ============================================================

      // Allocate config struct
      const configPtr = Module._malloc(256);
      Module._dotlottie_init_config(configPtr);
      console.log("✓ Config initialized");

      // Create the player
      const player = Module._dotlottie_new_player(configPtr);
      if (player === 0) {
        throw new Error("Failed to create player");
      }
      console.log("✓ Player created");

      const canvas = document.querySelector("canvas");

      // Allocate frame buffer for software rendering
      // Set explicit canvas dimensions
      let canvasWidth = 800;
      let canvasHeight = 600;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;

      let bufferSize = canvasWidth * canvasHeight * 4; // RGBA = 4 bytes per pixel
      let bufferPtr = Module._malloc(bufferSize);
      console.log(
        `✓ Allocated ${bufferSize} bytes for ${canvasWidth}x${canvasHeight} buffer`
      );

      // Set software rendering target
      // ColorSpace enum: 0 = ABGR8888
      const colorSpace = 0;
      const stride = canvasWidth;

      const setTargetResult = Module._dotlottie_set_sw_target(
        player,
        bufferPtr,
        stride,
        canvasWidth,
        canvasHeight,
        colorSpace
      );

      if (setTargetResult !== 0) {
        throw new Error(
          `Failed to set software rendering target, error code: ${setTargetResult}`
        );
      }
      console.log("✓ Software rendering target set");

      // Load animation data
      const animationUrl =
        "./dotlottie-rs/assets/animations/lottie/bouncy_ball.json";
      const data = await fetch(animationUrl).then((res) => res.text());
      const animationPtr = allocateUTF8(Module, data);

      const loadResult = Module._dotlottie_load_animation_data(
        player,
        animationPtr,
        canvasWidth,
        canvasHeight
      );

      Module._free(animationPtr);

      if (loadResult !== 0) {
        throw new Error("Failed to load animation data");
      }
      console.log("✓ Animation loaded");

      // Query animation info
      const totalFramesPtr = Module._malloc(4);
      Module._dotlottie_total_frames(player, totalFramesPtr);
      const totalFrames = Module.HEAPF32[totalFramesPtr >> 2];
      Module._free(totalFramesPtr);

      const durationPtr = Module._malloc(4);
      Module._dotlottie_duration(player, durationPtr);
      const duration = Module.HEAPF32[durationPtr >> 2];
      Module._free(durationPtr);

      console.log(
        `✓ Animation info: ${totalFrames} frames, ${duration.toFixed(2)}s`
      );

      // Start playing
      Module._dotlottie_play(player);

      resize();

      const ctx = canvas.getContext("2d");

      let animationFrameId = null;
      let shouldLoop = true;
      let lastTickTime = performance.now();
      let speedMultiplier = 1.0;

      // Pan and zoom state
      let currentZoom = 1.0;
      let panX = 0.0;
      let panY = 0.0;
      let isPanning = false;
      let lastTouchX = 0;
      let lastTouchY = 0;

      function updateTransformDisplay() {
        transformDisplay.textContent = `Scale: ${currentZoom.toFixed(
          2
        )}, Pan: (${panX.toFixed(1)}, ${panY.toFixed(1)})`;
      }

      function applyPanZoom() {
        // Note: C API transform functions may need to be implemented
        // For now, we'll just update the display
        updateTransformDisplay();
        // render() will be called by the animation loop
      }

      function resetPanZoom() {
        currentZoom = 1.0;
        panX = 0.0;
        panY = 0.0;
        updateTransformDisplay();
      }

      function animationLoop() {
        const now = performance.now();

        // Check if animation is complete and should loop
        const isComplete = Module._dotlottie_is_complete(player);
        if (isComplete === 1 && shouldLoop) {
          Module._dotlottie_seek(player, 0);
          Module._dotlottie_play(player);
        }

        // Check if we're playing before ticking
        const isPlaying = Module._dotlottie_is_playing(player);

        // Apply speed control
        const timeSinceLastTick = now - lastTickTime;
        const tickInterval = 1000 / 60 / speedMultiplier;

        if (isPlaying === 1 && timeSinceLastTick >= tickInterval) {
          Module._dotlottie_tick(player);
          lastTickTime = now;
        }

        // Render the current frame
        render();

        animationFrameId = requestAnimationFrame(animationLoop);
      }

      animationFrameId = requestAnimationFrame(animationLoop);

      playBtn.addEventListener("click", () => {
        Module._dotlottie_play(player);
      });

      pauseBtn.addEventListener("click", () => {
        Module._dotlottie_pause(player);
      });

      jumpBtn.addEventListener("click", () => {
        Module._dotlottie_seek(player, 44);
      });

      resizeBtn.addEventListener("click", () => {
        resize();
      });

      progressBar.addEventListener("mousedown", () => {
        cancelAnimationFrame(animationFrameId);
      });

      progressBar.addEventListener("mouseup", () => {
        animationFrameId = requestAnimationFrame(animationLoop);
      });

      progressBar.addEventListener("input", (event) => {
        const newFrame = (event.target.value / 100) * totalFrames;
        Module._dotlottie_seek(player, newFrame);
        render();
      });

      function resize() {
        const { width: clientWidth, height: clientHeight } =
          canvas.getBoundingClientRect();

        const newWidth = Math.floor(
          clientWidth * (window.devicePixelRatio || 1)
        );
        const newHeight = Math.floor(
          clientHeight * (window.devicePixelRatio || 1)
        );

        if (newWidth !== canvasWidth || newHeight !== canvasHeight) {
          canvas.width = newWidth;
          canvas.height = newHeight;

          // Free old buffer and allocate new one
          Module._free(bufferPtr);
          canvasWidth = newWidth;
          canvasHeight = newHeight;
          bufferSize = canvasWidth * canvasHeight * 4;
          bufferPtr = Module._malloc(bufferSize);

          // Reset software rendering target with new buffer
          const stride = canvasWidth;
          const colorSpace = 0;
          Module._dotlottie_set_sw_target(
            player,
            bufferPtr,
            stride,
            canvasWidth,
            canvasHeight,
            colorSpace
          );

          Module._dotlottie_resize(player, newWidth, newHeight);
        }
      }

      function setViewport() {
        const viewportWidth = Number(renderAreaWidthInput.value) * canvas.width;
        const viewportHeight =
          Number(renderAreaHeightInput.value) * canvas.height;
        // Note: C API viewport functions may need to be implemented
        // For now, rendering uses the full canvas size
      }

      function render() {
        setViewport();

        // Copy buffer from WASM memory to canvas
        const bufferView = new Uint8ClampedArray(
          Module.HEAPU8.buffer,
          bufferPtr,
          bufferSize
        );

        const imageData = new ImageData(
          new Uint8ClampedArray(bufferView),
          canvasWidth,
          canvasHeight
        );

        ctx.putImageData(imageData, 0, 0);

        // Note: Layer bounds drawing removed as C API may not have this function
        // If needed, implement using Module._dotlottie_get_layer_bounds
      }

      modeSelect.addEventListener("change", (event) => {
        const mode = parseInt(event.target.value);
        // Note: C API mode setting may need implementation
        // For now, mode changes are not supported in this version
        console.log("Mode change requested:", mode);
      });

      speedUpBtn.addEventListener("click", () => {
        speedMultiplier += 0.1;
        console.log("Speed:", speedMultiplier.toFixed(1));
      });

      speedDownBtn.addEventListener("click", () => {
        speedMultiplier = Math.max(0.1, speedMultiplier - 0.1);
        console.log("Speed:", speedMultiplier.toFixed(1));
      });

      loopToggle.addEventListener("click", () => {
        shouldLoop = !shouldLoop;
        console.log("Loop:", shouldLoop ? "enabled" : "disabled");
      });

      let i = 0;
      nextBtn.addEventListener("click", () => {
        // Note: Manifest and multiple animation loading not implemented in C API version
        console.log("Next animation button clicked (not implemented)");
      });

      bgColorInput.addEventListener("input", (event) => {
        const color = parseInt(event.target.value.slice(1) + "ff", 16);
        // Note: Background color setting not implemented in C API version
        console.log("Background color:", event.target.value);
      });

      fitSelect.addEventListener("change", (event) => {
        const fit = event.target.value;
        // Note: Fit setting not implemented in C API version
        console.log("Fit changed:", fit);
      });

      alignSelect.addEventListener("change", (event) => {
        const [x, y] = event.target.value.split(",").map(Number);
        // Note: Align setting not implemented in C API version
        console.log("Align changed:", x, y);
      });

      themeSelect.addEventListener("change", (event) => {
        const theme = event.target.value;
        // Note: Theme/slots not implemented in C API version
        console.log("Theme changed:", theme);
      });

      // Pan and zoom event listeners
      resetTransformBtn.addEventListener("click", resetPanZoom);

      // Pan and zoom sensitivity constants
      const zoomMouseSensitivity = 1.1;
      const zoomTrackpadSensitivity = 1.02;
      const panSensitivity = 1.0;

      // Enhanced wheel handler for both panning and zooming
      canvas.addEventListener("wheel", (event) => {
        event.preventDefault();

        const rect = canvas.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;

        // Convert to canvas coordinates
        const canvasMouseX = (mouseX / rect.width) * canvas.width;
        const canvasMouseY = (mouseY / rect.height) * canvas.height;

        const isPinchZoom = event.ctrlKey || event.metaKey;

        if (isPinchZoom) {
          // Zoom behavior (Cmd/Ctrl + wheel)
          const usingTrackpad = event.ctrlKey || event.metaKey;
          const zoomSensitivity = usingTrackpad
            ? zoomTrackpadSensitivity
            : zoomMouseSensitivity;
          const zoomFactor =
            event.deltaY > 0 ? 1 / zoomSensitivity : zoomSensitivity;
          const newZoom = Math.max(
            0.1,
            Math.min(5.0, currentZoom * zoomFactor)
          );

          // Calculate the point in world space before zoom
          const worldX = (canvasMouseX - panX) / currentZoom;
          const worldY = (canvasMouseY - panY) / currentZoom;

          // Update zoom
          currentZoom = newZoom;

          // Calculate new pan to keep the same world point under the mouse
          panX = canvasMouseX - worldX * currentZoom;
          panY = canvasMouseY - worldY * currentZoom;

          applyPanZoom();
        } else {
          // Pan behavior (regular wheel scroll)
          panX -= event.deltaX * panSensitivity;
          panY -= event.deltaY * panSensitivity;

          applyPanZoom();
        }
      });

      // Pan with trackpad (two-finger drag)
      let isTrackpadPanning = false;
      let lastPanX = 0;
      let lastPanY = 0;

      canvas.addEventListener("touchstart", (event) => {
        if (event.touches.length === 2) {
          event.preventDefault();
          isTrackpadPanning = true;
          const touch1 = event.touches[0];
          const touch2 = event.touches[1];
          lastPanX = (touch1.clientX + touch2.clientX) / 2;
          lastPanY = (touch1.clientY + touch2.clientY) / 2;
        }
      });

      canvas.addEventListener("touchmove", (event) => {
        if (isTrackpadPanning && event.touches.length === 2) {
          event.preventDefault();
          const touch1 = event.touches[0];
          const touch2 = event.touches[1];
          const currentPanX = (touch1.clientX + touch2.clientX) / 2;
          const currentPanY = (touch1.clientY + touch2.clientY) / 2;

          const deltaX = currentPanX - lastPanX;
          const deltaY = currentPanY - lastPanY;

          panX += deltaX / currentZoom; // Adjust pan sensitivity based on zoom
          panY += deltaY / currentZoom;

          lastPanX = currentPanX;
          lastPanY = currentPanY;

          applyPanZoom();
        }
      });

      canvas.addEventListener("touchend", (event) => {
        if (event.touches.length < 2) {
          isTrackpadPanning = false;
        }
      });

      // Alternative pan with mouse drag (while holding Shift)
      let isMousePanning = false;
      let mouseLastX = 0;
      let mouseLastY = 0;

      canvas.addEventListener("mousedown", (event) => {
        if (event.shiftKey) {
          isMousePanning = true;
          mouseLastX = event.clientX;
          mouseLastY = event.clientY;
          canvas.style.cursor = "move";
          event.preventDefault();
        }
      });

      canvas.addEventListener("mousemove", (event) => {
        if (isMousePanning) {
          const deltaX = event.clientX - mouseLastX;
          const deltaY = event.clientY - mouseLastY;

          panX += deltaX / currentZoom;
          panY += deltaY / currentZoom;

          mouseLastX = event.clientX;
          mouseLastY = event.clientY;

          applyPanZoom();
        }
      });

      canvas.addEventListener("mouseup", () => {
        if (isMousePanning) {
          isMousePanning = false;
          canvas.style.cursor = "default";
        }
      });

      // Prevent context menu on canvas
      canvas.addEventListener("contextmenu", (event) => {
        event.preventDefault();
      });

      // Cleanup on page unload
      window.addEventListener("beforeunload", () => {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
        }
        Module._dotlottie_destroy(player);
        Module._free(bufferPtr);
        Module._free(configPtr);
        console.log("✓ Cleaned up resources");
      });
    </script>
  </body>
</html>
