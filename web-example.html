<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WASM test</title>
</head>

<body>
  <div style="width: 200px">
    <canvas style="width: 100%; height: 100%; border: 1px solid black"></canvas>
  </div>
  <script type="module">
    import createDotLottiePlayerModule from './release/wasm/dotlottie_player.js';
    const EVENT_SIZE = 12;
    const LAYER_BOUNDS_SIZE = 32; // 8 floats * 4 bytes

    const Module = await createDotLottiePlayerModule({
      locateFile: (path, prefix) => {
        if (path.endsWith(".wasm")) {
          return `release/wasm/${path}`;
        }
        return `${prefix}${path}`;
      },
    });

    console.log("Module loaded:", Module);

    // ============================================================================
    // Constants from WASM bindings (no hardcoding!)
    // ============================================================================

    // Return codes
    const DOTLOTTIE_SUCCESS = Module._dotlottie_success();
    const DOTLOTTIE_ERROR = Module._dotlottie_error();
    const DOTLOTTIE_INVALID_PARAMETER = Module._dotlottie_invalid_parameter();
    const DOTLOTTIE_MANIFEST_NOT_AVAILABLE = Module._dotlottie_manifest_not_available();

    // Mode enum values
    const MODE = {
      Forward: Module._dotlottie_mode_forward(),
      Reverse: Module._dotlottie_mode_reverse(),
      Bounce: Module._dotlottie_mode_bounce(),
      ReverseBounce: Module._dotlottie_mode_reverse_bounce()
    };

    // Fit enum values
    const FIT = {
      Contain: Module._dotlottie_fit_contain(),
      Fill: Module._dotlottie_fit_fill(),
      Cover: Module._dotlottie_fit_cover(),
      FitWidth: Module._dotlottie_fit_width(),
      FitHeight: Module._dotlottie_fit_height(),
      None: Module._dotlottie_fit_none()
    };

    // Player event types
    const PlayerEventType = {
      Load: Module._dotlottie_event_load(),
      LoadError: Module._dotlottie_event_load_error(),
      Play: Module._dotlottie_event_play(),
      Pause: Module._dotlottie_event_pause(),
      Stop: Module._dotlottie_event_stop(),
      Frame: Module._dotlottie_event_frame(),
      Render: Module._dotlottie_event_render(),
      Loop: Module._dotlottie_event_loop(),
      Complete: Module._dotlottie_event_complete()
    };

    function withString(str, callback) {
      const size = Module.lengthBytesUTF8(str) + 1; // +1 for null terminator
      const ptr = Module._malloc(size);
      Module.stringToUTF8(str, ptr, size);
      try {
        return callback(ptr);
      } finally {
        Module._free(ptr);
      }
    }

    // ============================================================================
    // Direct C API Functions (from WasmModule interface)
    // ============================================================================

    const api = {
      // Config allocation
      configNew: () => Module._dotlottie_config_new(),
      configFree: (ptr) => Module._dotlottie_config_free(ptr),
      initConfig: (ptr) => Module._dotlottie_init_config(ptr),  // legacy

      // Player lifecycle
      newPlayer: (ptr) => Module._dotlottie_new_player(ptr),
      destroy: (ptr) => Module._dotlottie_destroy(ptr),

      // Loading (string params need special handling)
      loadAnimationData: (playerPtr, data, width, height) =>
        withString(data, (dataPtr) => Module._dotlottie_load_animation_data(playerPtr, dataPtr, width, height)),
      loadAnimationPath: (playerPtr, path, width, height) =>
        withString(path, (pathPtr) => Module._dotlottie_load_animation_path(playerPtr, pathPtr, width, height)),
      loadAnimation: (playerPtr, animId, width, height) =>
        withString(animId, (idPtr) => Module._dotlottie_load_animation(playerPtr, idPtr, width, height)),

      // Playback control
      play: (ptr) => Module._dotlottie_play(ptr),
      pause: (ptr) => Module._dotlottie_pause(ptr),
      stop: (ptr) => Module._dotlottie_stop(ptr),
      seek: (ptr, frame) => Module._dotlottie_seek(ptr, frame),
      setFrame: (ptr, frame) => Module._dotlottie_set_frame(ptr, frame),

      // Rendering
      tick: (ptr) => Module._dotlottie_tick(ptr),
      render: (ptr) => Module._dotlottie_render(ptr),
      resize: (ptr, w, h) => Module._dotlottie_resize(ptr, w, h),
      clear: (ptr) => Module._dotlottie_clear(ptr),

      // Buffer access
      bufferPtr: (ptr, resultPtr) => Module._dotlottie_buffer_ptr(ptr, resultPtr),
      bufferLen: (ptr, resultPtr) => Module._dotlottie_buffer_len(ptr, resultPtr),

      // State queries
      isLoaded: (ptr) => Module._dotlottie_is_loaded(ptr),
      isPlaying: (ptr) => Module._dotlottie_is_playing(ptr),
      isPaused: (ptr) => Module._dotlottie_is_paused(ptr),
      isStopped: (ptr) => Module._dotlottie_is_stopped(ptr),
      isComplete: (ptr) => Module._dotlottie_is_complete(ptr),

      // Animation info
      totalFrames: (ptr, resultPtr) => Module._dotlottie_total_frames(ptr, resultPtr),
      duration: (ptr, resultPtr) => Module._dotlottie_duration(ptr, resultPtr),
      currentFrame: (ptr, resultPtr) => Module._dotlottie_current_frame(ptr, resultPtr),
      loopCount: (ptr, resultPtr) => Module._dotlottie_loop_count(ptr, resultPtr),
      animationSize: (ptr, wPtr, hPtr) => Module._dotlottie_animation_size(ptr, wPtr, hPtr),
      segmentDuration: (ptr, resultPtr) => Module._dotlottie_segment_duration(ptr, resultPtr),

      // Config
      config: (ptr, resultPtr) => Module._dotlottie_config(ptr, resultPtr),

      // Viewport
      setViewport: (ptr, x, y, w, h) => Module._dotlottie_set_viewport(ptr, x, y, w, h),

      // Theme & Slots (string params)
      setTheme: (ptr, themeId) => withString(themeId, (strPtr) => Module._dotlottie_set_theme(ptr, strPtr)),
      resetTheme: (ptr) => Module._dotlottie_reset_theme(ptr),
      setSlotsStr: (ptr, json) => withString(json, (strPtr) => Module._dotlottie_set_slots_str(ptr, strPtr)),
      clearSlots: (ptr) => Module._dotlottie_clear_slots(ptr),

      // Layer bounds (string param)
      getLayerBounds: (ptr, layerName, resultPtr) =>
        withString(layerName, (strPtr) => Module._dotlottie_get_layer_bounds(ptr, strPtr, resultPtr)),

      // Markers
      markers: (ptr, resultPtr, sizePtr) => Module._dotlottie_markers(ptr, resultPtr, sizePtr),

      // Events
      pollEvent: (ptr, eventPtr) => Module._dotlottie_poll_event(ptr, eventPtr),

      // Manifest
      manifest: (ptr, resultPtr) => Module._dotlottie_manifest(ptr, resultPtr),
      manifestAnimations: (ptr, resultPtr, sizePtr) => Module._dotlottie_manifest_animations(ptr, resultPtr, sizePtr),

      // Config helpers (ABI-stable - no hardcoded offsets needed!)
      configSetMode: (ptr, mode) => Module._dotlottie_config_set_mode(ptr, mode),
      configSetLoopAnimation: (ptr, loop) => Module._dotlottie_config_set_loop_animation(ptr, loop),
      configSetLoopCount: (ptr, count) => Module._dotlottie_config_set_loop_count(ptr, count),
      configSetSpeed: (ptr, speed) => Module._dotlottie_config_set_speed(ptr, speed),
      configSetUseFrameInterpolation: (ptr, use) => Module._dotlottie_config_set_use_frame_interpolation(ptr, use),
      configSetAutoplay: (ptr, autoplay) => Module._dotlottie_config_set_autoplay(ptr, autoplay),
      configSetSegment: (ptr, start, end) => Module._dotlottie_config_set_segment(ptr, start, end),
      configSetSegmentStart: (ptr, start) => Module._dotlottie_config_set_segment_start(ptr, start),
      configSetSegmentEnd: (ptr, end) => Module._dotlottie_config_set_segment_end(ptr, end),
      configSetBackgroundColor: (ptr, color) => Module._dotlottie_config_set_background_color(ptr, color),
      configSetLayoutFit: (ptr, fit) => Module._dotlottie_config_set_layout_fit(ptr, fit),
      configSetLayoutAlign: (ptr, x, y) => Module._dotlottie_config_set_layout_align(ptr, x, y),
      configSetMarker: (ptr, marker) => withString(marker, (strPtr) => Module._dotlottie_config_set_marker(ptr, strPtr)),
      configSetThemeId: (ptr, themeId) => withString(themeId, (strPtr) => Module._dotlottie_config_set_theme_id(ptr, strPtr)),
      configSetStateMachineId: (ptr, smId) => withString(smId, (strPtr) => Module._dotlottie_config_set_state_machine_id(ptr, strPtr)),
      configSetAnimationId: (ptr, animId) => withString(animId, (strPtr) => Module._dotlottie_config_set_animation_id(ptr, strPtr)),
    };

    // ============================================================================
    // Helper Functions
    // ============================================================================

    /**
     * Allocate and initialize a config struct.
     * Uses api.configNew() - no manual malloc or size calculation needed!
     */
    function allocateConfig() {
      return api.configNew();
    }

    function getFloat(ptr) {
      const resultPtr = Module._malloc(4);
      const status = ptr(resultPtr);
      const value = Module.getValue(resultPtr, 'float');
      Module._free(resultPtr);
      return value;
    }

    function getTotalFrames(playerPtr) {
      const resultPtr = Module._malloc(4);
      api.totalFrames(playerPtr, resultPtr);
      const value = Module.getValue(resultPtr, 'float');
      Module._free(resultPtr);
      return value;
    }

    function getCurrentFrame(playerPtr) {
      const resultPtr = Module._malloc(4);
      api.currentFrame(playerPtr, resultPtr);
      const value = Module.getValue(resultPtr, 'float');
      Module._free(resultPtr);
      return value;
    }

    function getAnimationSize(playerPtr) {
      const widthPtr = Module._malloc(4);
      const heightPtr = Module._malloc(4);
      api.animationSize(playerPtr, widthPtr, heightPtr);
      const width = Module.getValue(widthPtr, 'float');
      const height = Module.getValue(heightPtr, 'float');
      Module._free(widthPtr);
      Module._free(heightPtr);
      return { width, height };
    }

    function getBufferPtr(playerPtr) {
      const resultPtr = Module._malloc(4);
      api.bufferPtr(playerPtr, resultPtr);
      const bufferPtr = Module.getValue(resultPtr, 'i32');
      Module._free(resultPtr);
      return bufferPtr;
    }

    /**
     * Create a new player with the given config options.
     * Uses the C API helper functions - no hardcoded offsets!
     */
    function createPlayerWithConfig(options = {}) {
      const configPtr = allocateConfig();

      // Apply options using the type-safe C API functions
      if (options.mode !== undefined) api.configSetMode(configPtr, options.mode);
      if (options.loopAnimation !== undefined) api.configSetLoopAnimation(configPtr, options.loopAnimation);
      if (options.loopCount !== undefined) api.configSetLoopCount(configPtr, options.loopCount);
      if (options.speed !== undefined) api.configSetSpeed(configPtr, options.speed);
      if (options.useFrameInterpolation !== undefined) api.configSetUseFrameInterpolation(configPtr, options.useFrameInterpolation);
      if (options.autoplay !== undefined) api.configSetAutoplay(configPtr, options.autoplay);
      if (options.segmentStart !== undefined && options.segmentEnd !== undefined) {
        api.configSetSegment(configPtr, options.segmentStart, options.segmentEnd);
      }
      if (options.backgroundColor !== undefined) api.configSetBackgroundColor(configPtr, options.backgroundColor);
      if (options.layoutFit !== undefined) api.configSetLayoutFit(configPtr, options.layoutFit);
      if (options.layoutAlignX !== undefined && options.layoutAlignY !== undefined) {
        api.configSetLayoutAlign(configPtr, options.layoutAlignX, options.layoutAlignY);
      }
      if (options.marker !== undefined) api.configSetMarker(configPtr, options.marker);
      if (options.themeId !== undefined) api.configSetThemeId(configPtr, options.themeId);
      if (options.stateMachineId !== undefined) api.configSetStateMachineId(configPtr, options.stateMachineId);
      if (options.animationId !== undefined) api.configSetAnimationId(configPtr, options.animationId);

      const playerPtr = api.newPlayer(configPtr);
      api.configFree(configPtr);

      return playerPtr;
    }

    function getLayerBounds(playerPtr, layerName) {
      const boundsPtr = Module._malloc(LAYER_BOUNDS_SIZE);
      const result = api.getLayerBounds(playerPtr, layerName, boundsPtr);

      if (result !== DOTLOTTIE_SUCCESS) {
        Module._free(boundsPtr);
        return [0, 0, 0, 0, 0, 0, 0, 0];
      }

      const bounds = [];
      for (let i = 0; i < 8; i++) {
        bounds.push(Module.getValue(boundsPtr + i * 4, 'float'));
      }
      Module._free(boundsPtr);
      return bounds;
    }

    // Process player events
    function processEvents(playerPtr) {
      const eventPtr = Module._malloc(EVENT_SIZE);

      while (api.pollEvent(playerPtr, eventPtr) === 1) {
        const eventType = Module.getValue(eventPtr, 'i32');
        const eventDataFloat = Module.getValue(eventPtr + 4, 'float');
        const eventDataInt = Module.getValue(eventPtr + 4, 'i32');

        switch (eventType) {
          case PlayerEventType.Load:
            console.log("Animation loaded!");
            break;
          case PlayerEventType.LoadError:
            console.error("Animation load error!");
            break;
          case PlayerEventType.Play:
            console.log("Animation started playing");
            break;
          case PlayerEventType.Pause:
            console.log("Animation paused");
            break;
          case PlayerEventType.Stop:
            console.log("Animation stopped");
            break;
          case PlayerEventType.Frame:
            // Uncomment to log frames: console.log(`Current frame: ${eventDataFloat}`);
            break;
          case PlayerEventType.Render:
            // Uncomment to log renders: console.log(`Rendered frame: ${eventDataFloat}`);
            break;
          case PlayerEventType.Loop:
            console.log(`Loop completed! Loop count: ${eventDataInt}`);
            break;
          case PlayerEventType.Complete:
            console.log("Animation completed!");
            break;
        }
      }

      Module._free(eventPtr);
    }

    // ============================================================================
    // Create Player
    // ============================================================================

    // Create player with config using the type-safe C API helpers
    // No hardcoded struct offsets needed!
    const playerPtr = createPlayerWithConfig({
      autoplay: true,
      loopAnimation: true,
    });

    if (!playerPtr) {
      console.error("Failed to create dotlottie player");
      throw new Error("Failed to create player");
    }

    console.log("Player created:", playerPtr);

    // ============================================================================
    // Load Animation
    // ============================================================================

    const data = await fetch(
      // "./examples/demo-player/src/text.json"
      // "./examples/demo-player/src/optimized.lottie"
      "./examples/demo-player/src/v2/gradient.json"
      // "https://lottie.host/294b684d-d6b4-4116-ab35-85ef566d4379/VkGHcqcMUI.lottie"
    ).then((res) => res.text());

    const canvas = document.querySelector("canvas");

    const loaded = api.loadAnimationData(
      playerPtr,
      data,
      canvas.width,
      canvas.height
    );

    if (loaded === DOTLOTTIE_SUCCESS) {
      const size = getAnimationSize(playerPtr);
      console.log({ width: size.width, height: size.height });
      resize();
    } else {
      console.error("Failed to load animation");
    }

    const ctx = canvas.getContext("2d");
    let animationFrameId = null;


    // ============================================================================
    // Render Functions
    // ============================================================================

    function resize() {
      const { width: clientWidth, height: clientHeight } = canvas.getBoundingClientRect();
      const width = Math.floor(clientWidth * (window.devicePixelRatio || 1));
      const height = Math.floor(clientHeight * (window.devicePixelRatio || 1));

      canvas.width = width;
      canvas.height = height;

      api.resize(playerPtr, width, height);
    }

    function render() {
      const tickResult = api.tick(playerPtr);
      processEvents(playerPtr);

      if (tickResult === DOTLOTTIE_SUCCESS) {
        const bufferPtr = getBufferPtr(playerPtr);
        const bufferLen = canvas.width * canvas.height * 4;

        const frameBuffer = new Uint8ClampedArray(
          Module.HEAPU8.buffer,
          bufferPtr,
          bufferLen
        );

        const imageData = ctx.createImageData(canvas.width, canvas.height);
        imageData.data.set(frameBuffer);
        ctx.putImageData(imageData, 0, 0);

        return true;
      }
      return false;
    }

    function animationLoop() {
      if (render()) {
        animationFrameId = requestAnimationFrame(animationLoop);
      } else {
        animationFrameId = requestAnimationFrame(animationLoop);
      }
    }

    animationFrameId = requestAnimationFrame(animationLoop);
  </script>
</body>

</html>
